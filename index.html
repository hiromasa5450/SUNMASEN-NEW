<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- ① ビューポート固定：ユーザーによるスケール操作を禁止（設計書 15.1） -->
<meta name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>スンマ戦</title>
<style>
  /* ② html/body レベルでタッチ操作を制御（設計書 15.1） */
  /* body自体を固定し、アドレスバー開閉によるスクロール／ずり上がりを根本封じ */
  html, body {
    margin: 0; padding: 0;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    background: #0a0a12;
    touch-action: none;            /* ブラウザ既定のパン・ズームを無効化 */
    overscroll-behavior: none;     /* バウンススクロール（iOS）も無効化 */
    -webkit-user-select: none;     /* テキスト選択によるズームを防止 */
    user-select: none;
    overflow: hidden;              /* スクロールバーを非表示 */
    -webkit-tap-highlight-color: transparent;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  }
  /* 100dvh で実表示領域に追従（アドレスバーを考慮した高さ） */
  #wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; height: 100dvh;
          display: flex; align-items: center; justify-content: center; overflow: hidden; }
  /* ③ ゲームCanvas自体にも念のため設定（設計書 15.1） */
  canvas {
    touch-action: none;
    display: block;
    background: #1a2238;
    max-width: 100%; max-height: 100%;
  }
  /* 縦画面の案内：操作を妨げない上部バナー（全画面で覆わない） */
  #rotate {
    position: fixed; top: 0; left: 0; right: 0; display: none;
    align-items: center; justify-content: center; padding: 8px 6px;
    background: rgba(10,10,18,0.85); color: #ffd166; font-size: 15px; text-align: center;
    z-index: 10; pointer-events: none;
  }
  @media (orientation: portrait) and (max-width: 900px) {
    #rotate { display: flex; }
  }
</style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="1280" height="720"></canvas></div>
  <div id="rotate">📱 横向きにするとより遊びやすくなります</div>

<script>
/* ④⑤ ダブルタップ／ピンチズームを preventDefault で完全遮断（設計書 15.1） */
document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', (e) => {
  // data-scroll を持つUI（リクエスト一覧など）内ではスクロールを許可
  if (e.target && e.target.closest && e.target.closest('[data-scroll]')) return;
  e.preventDefault();
}, { passive: false });
let __lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - __lastTouchEnd < 300) e.preventDefault();
  __lastTouchEnd = now;
}, { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('contextmenu', (e) => e.preventDefault());

/* ⑥ 何らかの理由でページがスクロールしても常に最上部へ引き戻す（横画面のずり上がり防止） */
function __pinTop() { if (window.scrollX || window.scrollY) window.scrollTo(0, 0); }
window.addEventListener('scroll', __pinTop, { passive: true });
window.addEventListener('orientationchange', () => setTimeout(__pinTop, 250));
if (window.visualViewport) {
  window.visualViewport.addEventListener('scroll', __pinTop);
  window.visualViewport.addEventListener('resize', __pinTop);
}
setInterval(__pinTop, 500);

/* ⑦ スマホ横画面：最初のタッチでフルスクリーン化し、ブラウザのツールバーを隠す
   （Android Chrome / iPad で有効。iPhone Safari は element 全画面非対応 → ホーム画面追加で全画面に） */
let __fsTried = false;
function __tryFullscreen() {
  if (__fsTried) return; __fsTried = true;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (fn) { try { const p = fn.call(el); if (p && p.catch) p.catch(() => {}); } catch (e) {} }
}
if ('ontouchstart' in window) {
  window.addEventListener('touchend', __tryFullscreen, { passive: true });
}
</script>
<!-- ネット対戦（任意）：Firebase設定があれば有効化。未設定ならローカルCPU対戦にフォールバック -->
<script>
/* =========================================================================
 *  スンマ戦 — ネット対戦レイヤー（任意）  Firebase Realtime Database
 *  設計書 3.3「対戦モード（部屋作成・参加）」/ 15「ネットワーク」/ 17.3「カラー被り同期」
 *
 *  ■ これは「任意」モジュールです。
 *    FIREBASE_CONFIG が null のままなら Net.available() === false となり、
 *    game.js は自動的にローカルCPU対戦へフォールバックします（今すぐ遊べます）。
 *
 *  ■ オンライン対戦を有効化する手順
 *    1) https://console.firebase.google.com/ でプロジェクト作成
 *    2) Realtime Database を作成（テスト用ルールでOK：開発中のみ）
 *    3) 「ウェブアプリ」を登録して構成オブジェクトを下の FIREBASE_CONFIG に貼り付け
 *    4) ページを開くと対戦モードで部屋作成/参加が使えるようになります
 *
 *  ■ 同期方式：ホスト権限（host-authoritative）
 *    - 部屋ホストがゲーム本体（World）をシミュレーションし、各キャラの状態を
 *      ブロードキャスト。参加者は自分の入力を送信し、受信状態を描画します。
 *    - RTDB はロビー・キャラ選択・部屋管理に最適。試合中の物理同期は
 *      レイテンシの影響を受けるベストエフォートです（LAN/近距離で良好）。
 * ========================================================================= */

// ▼▼▼ ここに Firebase の構成を貼り付けると有効化されます ▼▼▼
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyByYFg2o6TcRRtLFt4xfHaPOzzUGDg2pRw",
  authDomain: "tps-game-817dc.firebaseapp.com",
  databaseURL: "https://tps-game-817dc-default-rtdb.firebaseio.com",
  projectId: "tps-game-817dc",
  storageBucket: "tps-game-817dc.firebasestorage.app",
  messagingSenderId: "538488947638",
  appId: "1:538488947638:web:e2b13d0c3ba5245c293717",
  measurementId: "G-2PDE3LRXMK"
};
/* 例:
const FIREBASE_CONFIG = {
  apiKey: "xxxx",
  authDomain: "xxxx.firebaseapp.com",
  databaseURL: "https://xxxx-default-rtdb.firebaseio.com",
  projectId: "xxxx",
  appId: "1:xxxx:web:xxxx",
};
*/

window.Net = (function () {
  let db = null, ready = false, me = null, roomCode = null, roomRef = null, isHost = false;
  let overlay = null, gameRef = null;
  let playersRef = null, stateRef = null, inputsRef = null, snapshotRef = null;
  // WebRTC（P2P）：試合中の入力/スナップショットをピア直結で流す。失敗時はRTDB中継にフォールバック
  const RTC_CFG = { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ] };
  let peers = {};          // ホスト：clientPid -> { pc, ch, open, pend:[] , remoteSet }
  let hostPeer = null;     // クライアント：ホストとの接続
  let inputsMap = {};      // ホスト：pid -> 最新入力（チャネル/RTDB混在対応）
  let snapCb = null, inputsCb = null;
  let reqListRef = null;   // キャラリクエスト一覧の購読

  function available() { return !!FIREBASE_CONFIG; }

  // Firebase SDK（compat）を動的ロード
  function loadSDK() {
    return new Promise((resolve, reject) => {
      if (window.firebase && firebase.database) return resolve();
      const a = document.createElement('script');
      a.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
      a.onload = () => {
        const b = document.createElement('script');
        b.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js';
        b.onload = resolve; b.onerror = reject;
        document.head.appendChild(b);
      };
      a.onerror = reject;
      document.head.appendChild(a);
    });
  }

  async function ensure() {
    if (ready) return;
    await loadSDK();
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    me = 'p_' + Math.random().toString(36).slice(2, 8);
    ready = true;
  }

  function gen4() { return String(Math.floor(1000 + Math.random() * 9000)); }

  // ---- 簡易DOMオーバーレイ（部屋作成/参加・待機ロビー：設計書 3.3） ----
  function showOverlay(html) {
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,10,20,0.92);color:#fff;z-index:50;font-family:sans-serif;text-align:center;';
      document.body.appendChild(overlay);
    }
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
  }
  function hideOverlay() { if (overlay) overlay.style.display = 'none'; }

  async function openRoomUI(Game) {
    gameRef = Game;
    try { await ensure(); } catch (e) { alert('Firebase接続に失敗しました。ローカル対戦に切替えます。'); Game.mode = 'versus'; Game.scene = 'charselect'; Game.resetSelect(); return; }
    menu();
  }

  // ===== キャラリクエスト（みんな共通の掲示板）=====
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
  async function openRequestUI(Game) {
    gameRef = Game;
    try { await ensure(); } catch (e) { alert('Firebaseに接続できませんでした'); return; }
    requestMenu();
  }
  function closeRequest() { if (reqListRef) { reqListRef.off(); reqListRef = null; } hideOverlay(); if (gameRef) gameRef.scene = 'title'; }
  function requestMenu() {
    showOverlay(`
      <div style="max-width:560px;width:92%;text-align:left;">
        <h1 style="font-size:32px;margin:0 0 4px;text-align:center;">📝 キャラリクエスト</h1>
        <div style="color:#9fb3d1;font-size:13px;text-align:center;margin-bottom:12px;">追加してほしいキャラの名前と性能を書いてね。開発者が見て制作します！</div>
        <input id="cr-name" maxlength="30" placeholder="キャラ名（例：ninja）" style="${INP2}">
        <textarea id="cr-perf" maxlength="300" placeholder="性能・能力（例：移動が速い／4段ジャンプ／〇〇できる…）" style="${TXT}"></textarea>
        <button id="cr-submit" style="${BTN}">リクエストを送信</button>
        <div style="color:#9fb3d1;font-size:14px;margin:14px 0 6px;">みんなのリクエスト</div>
        <div id="cr-list" data-scroll style="max-height:34vh;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;background:#141c30;border-radius:10px;padding:8px;"></div>
        <div style="text-align:center;"><button id="cr-close" style="${BTN2}">閉じる</button></div>
      </div>`);
    reqListRef = db.ref('charRequests');
    reqListRef.limitToLast(50).on('value', (s) => renderReqList(s.val() || {}),
      () => { const el = document.getElementById('cr-list'); if (el) el.innerHTML = '<div style="color:#ff8080;">一覧を読み込めません（Firebaseルールで charRequests の読み取りを許可してください）</div>'; });
    document.getElementById('cr-submit').onclick = async () => {
      const name = document.getElementById('cr-name').value.trim();
      const perf = document.getElementById('cr-perf').value.trim();
      if (!name) { alert('キャラ名を入力してください'); return; }
      try {
        await db.ref('charRequests').push({ name: name.slice(0, 30), perf: perf.slice(0, 300), by: me, ts: Date.now() });
        document.getElementById('cr-name').value = ''; document.getElementById('cr-perf').value = '';
      } catch (e) { alert('送信に失敗しました。Firebaseルールで charRequests の書き込みを許可してください。'); }
    };
    document.getElementById('cr-close').onclick = closeRequest;
  }
  function renderReqList(obj) {
    const items = Object.values(obj).sort((a, b) => (b.ts || 0) - (a.ts || 0));
    const el = document.getElementById('cr-list'); if (!el) return;
    el.innerHTML = items.length ? items.map(r => {
      const d = r.ts ? new Date(r.ts) : null;
      const ds = d ? (d.getMonth() + 1) + '/' + d.getDate() : '';
      return `<div style="background:#1d2840;border-radius:8px;padding:8px 10px;margin:6px 0;">
        <div style="display:flex;justify-content:space-between;"><b style="color:#ffd166;">${esc(r.name)}</b><span style="color:#6b7a99;font-size:12px;">${ds}</span></div>
        ${r.perf ? `<div style="color:#cfd8e8;font-size:13px;white-space:pre-wrap;margin-top:2px;">${esc(r.perf)}</div>` : ''}</div>`;
    }).join('') : '<div style="color:#9fb3d1;padding:8px;">まだリクエストはありません。最初の1件を書いてみよう！</div>';
  }

  function menu() {
    showOverlay(`
      <div style="max-width:480px;">
        <h1 style="font-size:40px;margin:0 0 24px;">対戦モード</h1>
        <button id="net-create" style="${BTN}">部屋を作成</button>
        <div style="margin:18px 0;color:#9fb3d1;">または</div>
        <input id="net-code" inputmode="numeric" maxlength="4" placeholder="4桁コード" style="${INP}">
        <button id="net-join" style="${BTN}">部屋に参加</button>
        <div><button id="net-back" style="${BTN2}">← タイトルへ</button></div>
      </div>`);
    document.getElementById('net-create').onclick = createRoom;
    document.getElementById('net-join').onclick = () => {
      const c = document.getElementById('net-code').value.trim();
      if (/^\d{4}$/.test(c)) joinRoom(c); else alert('4桁の数字を入力してください');
    };
    document.getElementById('net-back').onclick = () => { hideOverlay(); gameRef.scene = 'title'; };
  }

  async function createRoom() {
    isHost = true;
    // 衝突しないコードを探す
    for (let tries = 0; tries < 10; tries++) {
      const code = gen4();
      const snap = await db.ref('rooms/' + code).get();
      if (!snap.exists()) {
        roomCode = code; roomRef = db.ref('rooms/' + code);
        await roomRef.set({ host: me, state: 'lobby', created: Date.now() });
        await joinPresence();
        lobby();
        return;
      }
    }
    alert('部屋作成に失敗しました');
  }

  async function joinRoom(code) {
    const snap = await db.ref('rooms/' + code).get();
    if (!snap.exists()) { alert('部屋が見つかりません'); return; }
    if (snap.val().state !== 'lobby') { alert('この部屋は既に開始済みです'); return; }
    const players = (await db.ref('rooms/' + code + '/players').get()).val() || {};
    if (Object.keys(players).length >= 4) { alert('満員です（最大4人）'); return; }
    isHost = false; roomCode = code; roomRef = db.ref('rooms/' + code);
    await joinPresence();
    lobby();
  }

  async function joinPresence() {
    const D = window.SunmaData;
    const players = (await roomRef.child('players').get()).val() || {};
    const n = Object.keys(players).length;
    const used = Object.values(players).map(p => p.color);
    let color = 0; for (let c = 0; c < 8; c++) { if (used.indexOf(c) < 0) { color = c; break; } }
    const pRef = roomRef.child('players/' + me);
    await pRef.set({ id: me, char: D.CHAR_ORDER[n % D.CHAR_ORDER.length], color: color, joined: Date.now() });
    pRef.onDisconnect().remove();
    roomRef.child('inputs/' + me).onDisconnect().remove();
  }

  function lobby() {
    playersRef = roomRef.child('players');
    playersRef.on('value', (snap) => renderLobby(snap.val() || {}));
    stateRef = roomRef.child('state');
    stateRef.on('value', async (snap) => {
      const st = snap.val();
      if (st === 'playing' && gameRef.scene !== 'countdown' && gameRef.scene !== 'battle') {
        const m = (await roomRef.child('match').get()).val();
        if (m) { hideOverlay(); setupRTC(m); gameRef.startNetMatch(m, me, isHost); }
      } else if (st === 'lobby' && (gameRef.scene === 'battle' || gameRef.scene === 'result' || gameRef.scene === 'countdown')) {
        // ホストが「キャラ選択へ戻る」を押した → 全員ロビーへ
        showLobbyNow();
      }
    });
  }

  // 結果画面などからロビー（キャラ/カラー選択）へ戻る
  async function showLobbyNow() {
    if (!roomRef) { if (gameRef) gameRef.scene = 'title'; return; }
    teardownRTC();
    const players = (await roomRef.child('players').get()).val() || {};
    renderLobby(players);
    if (gameRef) { gameRef.scene = 'room'; if (gameRef.world) gameRef.world.netRole = null; }
  }
  function returnToLobby() {
    if (!roomRef) { if (gameRef) gameRef.scene = 'title'; return; }
    if (isHost) {
      // ホストは試合データを掃除し、部屋をロビー状態へ戻す（全員が連動して戻る）
      roomRef.child('match').remove();
      roomRef.child('snapshot').remove();
      roomRef.child('inputs').remove();
      roomRef.child('rtc').remove();
      roomRef.child('state').set('lobby');
    }
    showLobbyNow();
  }

  function renderLobby(players) {
    const D = window.SunmaData;
    const entries = Object.entries(players).sort((a, b) => (a[1].joined || 0) - (b[1].joined || 0));
    const myP = players[me] || {};
    const rows = entries.map(([id, p], i) => {
      const col = (D.COLORS[p.color] && D.COLORS[p.color].std) || '#fff';
      const cd = D.CHARS[p.char] || {};
      const nm = cd.name || p.char;
      // 自分の枠には、選んだキャラの説明を名前の下に軽く表示
      const desc = (id === me && cd.desc) ? `<div style="font-size:13px;color:#9fb3d1;margin-top:2px;">${cd.desc}</div>` : '';
      return `<div style="margin:6px 0;">
        <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
          <span style="width:14px;height:14px;border-radius:50%;background:${col};display:inline-block;"></span>
          <b>${id === me ? 'あなた' : 'P' + (i + 1)}</b> — ${nm}</div>
        ${desc}</div>`;
    }).join('');
    const charBtns = D.CHAR_ORDER.map((cid) =>
      `<button data-char="${cid}" style="${SEL}${myP.char === cid ? 'outline:3px solid #ffd166;background:#3a6ea5;' : ''}">${D.CHARS[cid].name}</button>`).join('');
    const colBtns = D.COLORS.map((c, i) =>
      `<button data-col="${i}" style="width:32px;height:32px;border-radius:50%;border:${myP.color === i ? '3px solid #fff' : '2px solid #222'};background:${c.std};margin:3px;cursor:pointer;"></button>`).join('');
    showOverlay(`
      <div style="max-width:560px;width:92%;">
        <h2 style="margin:0;">部屋コード</h2>
        <div style="font-size:56px;letter-spacing:10px;font-weight:bold;color:#ffd166;">${roomCode}</div>
        <div style="color:#9fb3d1;margin:6px 0 10px;">2〜4人 / 友達にコードを共有</div>
        <div style="background:#1d2840;border-radius:12px;padding:10px;margin-bottom:10px;">${rows}</div>
        <div style="color:#9fb3d1;font-size:14px;">あなたのキャラ</div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin:4px 0;">${charBtns}</div>
        <div style="color:#9fb3d1;font-size:14px;">カラー</div>
        <div style="display:flex;flex-wrap:wrap;justify-content:center;">${colBtns}</div>
        ${isHost ? `<button id="net-start" style="${BTN}">試合開始（2〜4人）</button>`
                 : `<div style="margin-top:14px;color:#9fb3d1;">ホストの開始を待っています…</div>`}
        <div><button id="net-leave" style="${BTN2}">退出</button></div>
      </div>`);
    overlay.querySelectorAll('[data-char]').forEach(b =>
      b.onclick = () => roomRef.child('players/' + me + '/char').set(b.getAttribute('data-char')));
    overlay.querySelectorAll('[data-col]').forEach(b =>
      b.onclick = () => roomRef.child('players/' + me + '/color').set(+b.getAttribute('data-col')));
    if (isHost) { const s = document.getElementById('net-start'); if (s) s.onclick = hostStart; }
    document.getElementById('net-leave').onclick = leave;
  }

  async function hostStart() {
    const players = (await roomRef.child('players').get()).val() || {};
    const entries = Object.entries(players).sort((a, b) => (a[1].joined || 0) - (b[1].joined || 0));
    if (entries.length < 2) { alert('2人以上で開始できます'); return; }
    if (entries.length > 4) { alert('最大4人です'); return; }
    const match = entries.map(([id, p]) => ({ pid: id, char: p.char, color: p.color }));
    await roomRef.child('inputs').remove();
    await roomRef.child('snapshot').remove();
    await roomRef.child('rtc').remove();       // シグナリングをクリーンに
    await roomRef.child('match').set(match);
    await roomRef.child('state').set('playing');
  }

  async function leave() {
    teardownRTC();
    try {
      if (playersRef) playersRef.off();
      if (stateRef) stateRef.off();
      if (inputsRef) inputsRef.off();
      if (snapshotRef) snapshotRef.off();
      if (roomRef) {
        await roomRef.child('players/' + me).remove();
        await roomRef.child('inputs/' + me).remove();
        if (isHost) await roomRef.remove();   // ホスト退出で部屋ごと解散
      }
    } catch (e) {}
    playersRef = stateRef = inputsRef = snapshotRef = null; roomRef = null;
    hideOverlay(); if (gameRef) gameRef.scene = 'title';
  }

  /* ===== WebRTC P2P 接続（Firebaseはシグナリングのみ） ===== */
  function sigRef(pid) { return roomRef.child('rtc/' + pid); }

  // 試合開始時に呼ぶ：ホストは各クライアントへ、クライアントはホストへ接続
  function setupRTC(match) {
    if (!roomRef || !window.RTCPeerConnection) return;
    teardownRTC();
    if (isHost) {
      const clientPids = Object.values(match).map(m => m.pid).filter(pid => pid !== me);
      clientPids.forEach(pid => hostConnect(pid));
    } else {
      clientConnect();
    }
  }

  function hostConnect(pid) {
    const pc = new RTCPeerConnection(RTC_CFG);
    const ch = pc.createDataChannel('game', { ordered: true });
    const peer = { pc, ch, open: false, pend: [], remoteSet: false };
    peers[pid] = peer;
    ch.onopen = () => { peer.open = true; };
    ch.onclose = () => { peer.open = false; };
    ch.onmessage = (e) => onPeerMessage(pid, e.data);
    pc.onicecandidate = (e) => { if (e.candidate) sigRef(pid).child('hostCand').push(e.candidate.toJSON()); };
    sigRef(pid).child('answer').on('value', async (s) => {
      const a = s.val();
      if (a && !peer.remoteSet) { peer.remoteSet = true; await pc.setRemoteDescription(new RTCSessionDescription(a)); flushCand(peer); }
    });
    sigRef(pid).child('cliCand').on('child_added', (s) => addCand(peer, s.val()));
    pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
      sigRef(pid).child('offer').set({ type: pc.localDescription.type, sdp: pc.localDescription.sdp });
    }).catch(() => {});
  }

  function clientConnect() {
    const pc = new RTCPeerConnection(RTC_CFG);
    const peer = { pc, ch: null, open: false, pend: [], remoteSet: false };
    hostPeer = peer;
    pc.ondatachannel = (e) => {
      const ch = e.channel; peer.ch = ch;
      ch.onopen = () => { peer.open = true; };
      ch.onclose = () => { peer.open = false; };
      ch.onmessage = (ev) => onHostMessage(ev.data);
    };
    pc.onicecandidate = (e) => { if (e.candidate) sigRef(me).child('cliCand').push(e.candidate.toJSON()); };
    sigRef(me).child('offer').on('value', async (s) => {
      const o = s.val();
      if (o && !peer.remoteSet) {
        peer.remoteSet = true;
        await pc.setRemoteDescription(new RTCSessionDescription(o));
        const a = await pc.createAnswer(); await pc.setLocalDescription(a);
        sigRef(me).child('answer').set({ type: a.type, sdp: a.sdp });
        flushCand(peer);
      }
    });
    sigRef(me).child('hostCand').on('child_added', (s) => addCand(peer, s.val()));
  }

  function addCand(peer, c) {
    if (!c) return;
    if (peer.remoteSet) peer.pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {});
    else peer.pend.push(c);
  }
  function flushCand(peer) { peer.pend.forEach(c => peer.pc.addIceCandidate(new RTCIceCandidate(c)).catch(() => {})); peer.pend = []; }

  function onPeerMessage(pid, data) {  // ホストがクライアントから受信
    let m; try { m = JSON.parse(data); } catch (e) { return; }
    if (m.t === 'in') { inputsMap[pid] = m.d; if (inputsCb) inputsCb(inputsMap); }
  }
  function onHostMessage(data) {        // クライアントがホストから受信
    let m; try { m = JSON.parse(data); } catch (e) { return; }
    if (m.t === 'sn' && snapCb) snapCb(m.d);
  }

  function teardownRTC() {
    for (const pid in peers) { try { peers[pid].ch && peers[pid].ch.close(); peers[pid].pc.close(); } catch (e) {} }
    peers = {};
    if (hostPeer) { try { hostPeer.ch && hostPeer.ch.close(); hostPeer.pc.close(); } catch (e) {} hostPeer = null; }
    inputsMap = {};
  }

  /* ----- 試合中の同期用 API（game.js から呼ぶ：P2P優先・RTDBフォールバック） ----- */
  function writeInput(obj) {            // クライアント → ホスト
    if (hostPeer && hostPeer.open && hostPeer.ch.readyState === 'open') {
      try { hostPeer.ch.send(JSON.stringify({ t: 'in', d: obj })); return; } catch (e) {}
    }
    if (roomRef) roomRef.child('inputs/' + me).set(obj);   // フォールバック
  }
  function onInputs(cb) {               // ホスト：全クライアントの入力を集約
    inputsCb = cb;
    inputsRef = roomRef.child('inputs');
    inputsRef.on('value', (s) => {       // RTDBフォールバック分を取り込む
      const m = s.val() || {};
      for (const pid in m) { if (!peers[pid] || !peers[pid].open) inputsMap[pid] = m[pid]; }
      cb(inputsMap);
    });
  }
  function writeSnapshot(obj) {          // ホスト → 全クライアント
    const msg = JSON.stringify({ t: 'sn', d: obj });
    let needRTDB = false;
    const pids = Object.keys(peers);
    if (pids.length === 0) needRTDB = true;
    for (const pid of pids) {
      const p = peers[pid];
      if (p.open && p.ch.readyState === 'open') { try { p.ch.send(msg); } catch (e) { needRTDB = true; } }
      else needRTDB = true;
    }
    if (needRTDB && roomRef) roomRef.child('snapshot').set(obj);   // 未接続クライアント向けフォールバック
  }
  function onSnapshot(cb) {              // クライアント：スナップショット受信
    snapCb = cb;
    snapshotRef = roomRef.child('snapshot');
    snapshotRef.on('value', (s) => { const v = s.val(); if (v && (!hostPeer || !hostPeer.open)) cb(v); });  // 未接続時のみRTDB
  }
  function setState(s)       { if (roomRef) roomRef.child('state').set(s); }
  function clearMatchData()  { if (roomRef) { roomRef.child('inputs').remove(); roomRef.child('snapshot').remove(); } }

  const BTN  = 'display:block;width:100%;padding:14px;margin:10px 0 6px;font-size:22px;border:none;border-radius:10px;background:#2e8b57;color:#fff;cursor:pointer;';
  const BTN2 = 'display:inline-block;padding:10px 20px;margin-top:12px;font-size:16px;border:none;border-radius:8px;background:#3a4a6a;color:#fff;cursor:pointer;';
  const INP  = 'display:block;width:100%;box-sizing:border-box;padding:14px;margin:8px 0;font-size:28px;text-align:center;letter-spacing:8px;border-radius:10px;border:2px solid #4a5a7a;background:#1d2840;color:#fff;';
  const SEL  = 'padding:8px 12px;font-size:15px;border:none;border-radius:8px;background:#26324d;color:#fff;cursor:pointer;';
  const INP2 = 'display:block;width:100%;box-sizing:border-box;padding:12px;margin:6px 0;font-size:18px;border-radius:10px;border:2px solid #4a5a7a;background:#1d2840;color:#fff;';
  const TXT  = 'display:block;width:100%;box-sizing:border-box;padding:12px;margin:6px 0;font-size:16px;height:84px;resize:none;border-radius:10px;border:2px solid #4a5a7a;background:#1d2840;color:#fff;font-family:inherit;';

  return {
    available, openRoomUI, openRequestUI,
    writeInput, onInputs, writeSnapshot, onSnapshot, setState, clearMatchData, leave, returnToLobby,
    get myId() { return me; },
    get isHost() { return isHost; },
  };
})();

/* ======================= 3. サウンド（Web Audio 合成 SE：設計書 15.2） ======================= */
const Sound = (() => {
  let ctx = null, master = null;
  function ensure() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain(); master.gain.value = 0.35; master.connect(ctx.destination);
    } catch (e) { ctx = null; }
  }
  function tone(freq, dur, type, vol, slideTo) {
    if (!ctx) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), ctx.currentTime + dur);
    g.gain.value = vol == null ? 0.5 : vol;
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime + dur);
  }
  function noise(dur, vol) {
    if (!ctx) return;
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const s = ctx.createBufferSource(), g = ctx.createGain();
    s.buffer = buf; g.gain.value = vol == null ? 0.4 : vol;
    s.connect(g); g.connect(master); s.start();
  }
  // SEキー → 合成パラメータ（設計書 15.2 のSE一覧に対応）
  const MAP = {
    se_punch1:   (d=0)=>tone(440,0.07,'square',0.4,360+d),
    se_punch2:   (d=0)=>tone(330,0.09,'square',0.5,260+d),
    se_punch3_kb:(d=0)=>{tone(180,0.18,'sawtooth',0.6,90); noise(0.12,0.5);},
    se_weapon_hit:()=>{tone(900,0.08,'square',0.4,600); noise(0.06,0.3);},
    se_gun_shot: ()=>{tone(220,0.08,'square',0.4,80); noise(0.05,0.4);},
    se_gun_hit:  ()=>tone(700,0.06,'triangle',0.3,500),
    se_sword_swing:()=>tone(600,0.12,'sine',0.25,1200),
    se_lance_thrust:()=>{tone(500,0.08,'sawtooth',0.3,300);},
    se_glove_hit:()=>{tone(140,0.16,'sawtooth',0.6,70); noise(0.1,0.5);},
    se_jump:  ()=>tone(520,0.12,'sine',0.3,820),
    se_jump2: ()=>tone(640,0.10,'sine',0.3,940),
    se_jump3: ()=>tone(760,0.08,'sine',0.3,1040),
    se_land:  ()=>noise(0.06,0.25),
    se_burst: ()=>{tone(120,0.4,'sawtooth',0.6,40); noise(0.35,0.6);},
    se_stock_lost:()=>tone(300,0.25,'square',0.5,120),
    se_countdown:()=>tone(880,0.15,'sine',0.5),
    se_gong: ()=>{tone(160,0.8,'sine',0.6,80); tone(240,0.8,'triangle',0.3,120);},
    se_item_open:()=>tone(1000,0.12,'triangle',0.35,1400),
    se_item_equip:()=>tone(700,0.08,'square',0.35,900),
    se_item_close:()=>tone(500,0.06,'triangle',0.25,300),
    se_special_activate:()=>{tone(300,0.4,'sawtooth',0.4,1200);},
    se_special_ready:()=>tone(1320,0.18,'sine',0.4),
    se_win:  ()=>{tone(523,0.15,'triangle',0.5); setTimeout(()=>tone(659,0.15,'triangle',0.5),150); setTimeout(()=>tone(784,0.3,'triangle',0.5),300);},
    se_ui_select:()=>tone(660,0.05,'square',0.3),
    se_ui_decide:()=>tone(880,0.1,'triangle',0.4,1100),
    se_timestop:()=>{ tone(700,0.5,'sine',0.5,90); tone(350,0.6,'triangle',0.3,60); noise(0.2,0.2); },
    se_timeresume:()=>tone(200,0.25,'sine',0.4,700),
    se_slow:()=>{ tone(500,0.45,'sawtooth',0.4,140); tone(250,0.5,'sine',0.3,90); },
  };
  let _rec = null;   // ネット対戦：ホストで鳴ったSEを記録してクライアントへ配信
  return {
    unlock(){ ensure(); if (ctx && ctx.state === 'suspended') ctx.resume(); },
    play(key, detune=0){ if (_rec) _rec.push(detune ? [key, detune] : [key]); ensure(); const f = MAP[key]; if (f) try{ f(detune); }catch(e){} },
    // クライアント側：受信したSEを鳴らす（記録はしない）
    playRemote(key, detune){ ensure(); const f = MAP[key]; if (f) try{ f(detune||0); }catch(e){} },
    beginCapture(){ _rec = []; },
    endCapture(){ const r = _rec || []; _rec = null; return r; },
    playHitWithDamage(dmgPct){ this.play('se_punch3_kb', Math.min(dmgPct*2,400)); },
  };
})();

/* ======================= 4. 入力（キーボード + 仮想コントローラ：設計書 4） ======================= */
const Input = {
  held: { left:false, right:false, up:false, down:false, X:false, Y:false, A:false, B:false, SP:false },
  prev: {},
  edge: {},                       // このフレームに押された
  // 仮想スティック状態
  stick: { active:false, id:null, ox:0, oy:0, dx:0, dy:0 },

  btnRects: {},
  pointerBtn: {},                 // pointerId -> button name

  kb: { left:false, right:false, up:false, down:false },   // キーボード方向（スティックと分離）

  init() {
    for (const k in this.held) this.prev[k] = false;
    window.addEventListener('keydown', e => this.key(e, true));
    window.addEventListener('keyup',   e => this.key(e, false));
    // フォーカスを失ったら全入力を解放（押しっぱなし防止）
    window.addEventListener('blur', () => this.releaseAll());
  },
  releaseAll() {
    for (const k in this.held) this.held[k] = false;
    this.kb.left = this.kb.right = this.kb.up = this.kb.down = false;
    this.stick.active = false; this.stick.id = null; this.stick.dx = 0; this.stick.dy = 0;
  },
  key(e, down) {
    let k = null;
    switch (e.code) {
      case 'ArrowLeft': case 'KeyA': k='left'; break;
      case 'ArrowRight': case 'KeyD': k='right'; break;
      case 'ArrowUp': case 'KeyW': k='up'; break;
      case 'ArrowDown': case 'KeyS': k='down'; break;
      case 'KeyK': k='X'; break;      // ジャンプ
      case 'KeyJ': k='Y'; break;      // 攻撃
      case 'KeyL': k='A'; break;      // アイテム
      case 'Semicolon': case 'KeyP': k='B'; break;   // 閉じる
      case 'Space': case 'ShiftLeft': k='SP'; break;
      case 'Enter': k='enter'; break;
    }
    if (k === 'left' || k === 'right' || k === 'up' || k === 'down') { this.kb[k] = down; e.preventDefault(); }
    else if (k && this.held.hasOwnProperty(k)) { this.held[k] = down; e.preventDefault(); }
    if (k === 'enter' && down) this._enter = true;
  },
  // 仮想コントローラ pointer（screen座標→canvas座標は Game 側で変換して渡す）
  onPointerDown(id, x, y) {
    // 左半分はスティック、右半分はボタン
    if (x < W * 0.42 && y > H * 0.45) {
      this.stick.active = true; this.stick.id = id; this.stick.ox = x; this.stick.oy = y; this.stick.dx = 0; this.stick.dy = 0;
      return;
    }
    for (const name in this.btnRects) {
      const r = this.btnRects[name];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        this.held[name] = true; this.pointerBtn[id] = name; return;
      }
    }
  },
  onPointerMove(id, x, y) {
    if (this.stick.active && this.stick.id === id) {
      this.stick.dx = x - this.stick.ox; this.stick.dy = y - this.stick.oy;
    }
  },
  onPointerUp(id) {
    if (this.stick.id === id) { this.stick.active = false; this.stick.id = null; this.stick.dx = 0; this.stick.dy = 0; }
    const b = this.pointerBtn[id];
    if (b) { this.held[b] = false; delete this.pointerBtn[id]; }
  },
  // スティックを held の方向へ反映してから edge を計算
  axisX: 0,                 // 左スティックの横アナログ量（-1..1）：倒し具合で移動の強弱
  update() {
    // スティック方向を毎フレーム算出（active でなければ全方向OFF＝離せばニュートラルに戻る）
    let sL = false, sR = false, sU = false, sD = false;
    this.axisX = 0;
    if (this.stick.active) {
      const dz = 18, ax = this.stick.dx, ay = this.stick.dy;
      if (Math.hypot(ax, ay) > dz) {
        if (Math.abs(ax) > Math.abs(ay) * 0.7) { if (ax < 0) sL = true; else sR = true; }
        if (ay < -dz && Math.abs(ay) > Math.abs(ax) * 0.9) sU = true;
        if (ay >  dz && Math.abs(ay) > Math.abs(ax) * 0.9) sD = true;
      }
      // 横アナログ量：デッドゾーン18px〜フル90pxを 0〜1 に正規化
      const dead = 18, maxR = 90, mag = Math.abs(ax);
      if (mag > dead) this.axisX = Math.sign(ax) * Math.min(1, (mag - dead) / (maxR - dead));
    }
    // キーボード or スティックのどちらかが入っていればON、両方ニュートラルなら必ずOFF
    this.held.left  = this.kb.left  || sL;
    this.held.right = this.kb.right || sR;
    this.held.up    = this.kb.up    || sU;
    this.held.down  = this.kb.down  || sD;
    for (const k in this.held) this.edge[k] = this.held[k] && !this.prev[k];
    for (const k in this.held) this.prev[k] = this.held[k];
  },
  // 左スティックの方向判定（設計書 4）
  dir() {
    if (this.held.up) return 'up';
    if (this.held.down) return 'down';
    if (this.held.left || this.held.right) return 'side';
    return 'none';
  },
  dirX() { return (this.held.right ? 1 : 0) - (this.held.left ? 1 : 0); },
  // 移動用のアナログ横入力（キーボードは±1、スティックは倒し具合）
  moveX() {
    if (this.kb.left && !this.kb.right) return -1;
    if (this.kb.right && !this.kb.left) return 1;
    if (this.stick.active) return this.axisX;
    return 0;
  },
};

/* ======================= 5. 補間ユーティリティ ======================= */
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rectsOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
function ri(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); const t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr; }

// 算数の問題（mathキャラ）：+ - × ÷、数字は15以下で簡単に
function genMathProblem() {
  const op = ['+', '-', '×', '÷'][Math.floor(Math.random() * 4)];
  let a, b, ans;
  if (op === '+') { a = ri(1, 15); b = ri(1, 15); ans = a + b; }
  else if (op === '-') { a = ri(1, 15); b = ri(1, a); ans = a - b; }
  else if (op === '×') { a = ri(2, 9); b = ri(2, 9); ans = a * b; }
  else { do { b = ri(2, 5); const c = ri(2, 5); a = b * c; ans = c; } while (a > 15); }
  const text = a + ' ' + op + ' ' + b;
  const set = new Set([ans]);
  while (set.size < 4) { const d = ans + ri(-4, 4); if (d >= 0 && d !== ans) set.add(d); }
  return { text, answer: ans, choices: shuffle([...set]) };
}

/* ======================= 6. Fighter（キャラ本体） ======================= */
let nextEntityId = 1;
class Fighter {
  constructor(charId, colorIdx, opts = {}) {
    this.eid = nextEntityId++;
    this.def = CHARS[charId];
    this.colorIdx = colorIdx;
    this.dimColor = !!opts.dim;          // 色被り（薄版）
    this.isHuman = !!opts.human;
    this.isBot = !!opts.bot;
    this.botMode = opts.botMode || 'cpu';  // 'static' | 'cpu'
    this.label = opts.label || this.def.name;

    this.x = 640; this.y = 540;          // y=足先
    this.vx = 0; this.vy = 0;
    this.facing = 1;                     // 1=右, -1=左（設計書 18）
    this.curFlipX = 1;
    this.grounded = false;
    this.jumpsLeft = this.def.jumps;

    this.damage = 0;                     // ％蓄積（設計書 9）
    this.stocks = 3;                     // ストック（設計書 11）
    this.dead = false;
    this.invuln = 90;                    // 出現時無敵
    this.hitstun = 0;
    this.respawnTimer = 0;

    this.weapon = 'bare';
    this.boxOpen = false;
    this.boxSel = 0;

    // SP（設計書 8）
    this.spActive = 0;                   // 残り効果フレーム
    this.spCooldown = 0;                 // 残りCDフレーム

    // シールド（Bボタン）
    this.shield = SHIELD_MAX;            // 耐久（0でガード割れ）
    this.shielding = false;              // 展開中
    this.guardBreak = 0;                 // ガード割れスタン残りフレーム

    // 算数（mathキャラ専用）
    this.mathSelecting = false;          // 対象選択中
    this.mathTargetIdx = 0;
    this.mathCooldown = 0;               // 算数攻撃のクールタイム
    this.mathFrozen = false;             // 出題されて静止中
    this.mathProblem = null;             // {text, answer, choices}
    this.mathTimer = 0; this.mathWrongFlash = 0;
    this._mathAnsSeen = 0; this._mathTgtSeen = 0;

    // 時間停止（timeキャラ）
    this.timeStopped = 0;                // >0：完全停止中の残りフレーム
    this.timeCooldown = 0;               // 時間停止のクールタイム

    // スロー（slowキャラ）
    this.slowed = 0;                     // >0：移動0.4倍にされている残りフレーム
    this.slowCooldown = 0;               // スローのクールタイム

    // お絵かき（Q2キャラ）
    this.drawing = false;                // 線を描いている間は無防備で行動不能

    // 攻撃状態
    this.attack = null;                  // {move, dir, t, dur, hit:Set, weapon}
    this.comboStep = 0; this.comboTimer = 0;

    // アニメ用ポーズ（角度°：0=真下、+で前方）
    this.pose = { lArm:18, rArm:18, lThigh:0, rThigh:0, lShin:8, rShin:8, lean:0, bob:0 };
    this.cur  = Object.assign({}, this.pose);
    this.animT = 0;
    this.state = 'idle';
  }

  color() { const c = COLORS[this.colorIdx]; return this.dimColor ? c.dim : c.std; }

  get moveSpeed() {
    let s = this.def.speed;
    if (this.spActive > 0) s *= 2;       // SP中×2（設計書 8）
    if (this.slowed > 0) s *= SLOW_FACTOR; // スロー中×0.4
    return s;
  }

  bodyRect() { return { x: this.x - 16, y: this.y - 66, w: 32, h: 66 }; }

  reset(spawn) {
    this.x = spawn.x; this.y = spawn.y;
    this.vx = 0; this.vy = 0;
    this.damage = 0; this.hitstun = 0; this.invuln = 90;
    this.attack = null; this.boxOpen = false; this.comboStep = 0;
    this.weapon = 'bare';
    this.shield = SHIELD_MAX; this.shielding = false; this.guardBreak = 0;
    this.mathSelecting = false; this.mathFrozen = false; this.mathProblem = null;
    this.timeStopped = 0; this.timeCooldown = 0; this.slowed = 0; this.slowCooldown = 0;
    this.drawing = false;
  }

  // このキャラ固有スキルのクールタイム（残りフレーム/最大）— 表示用
  specialCD() {
    if (this.def.id === 'chara_time') return this.timeCooldown;
    if (this.def.id === 'chara_slow') return this.slowCooldown;
    if (this.def.id === 'chara_math') return this.mathCooldown;
    return 0;
  }
  specialCDMax() {
    if (this.def.id === 'chara_time') return TIME_CD;
    if (this.def.id === 'chara_slow') return SLOW_CD;
    if (this.def.id === 'chara_math') return 480;
    return 0;
  }

  // アイテムボックスの選択肢（math/timeは6つ目に固有ボタン）
  boxOptions() {
    const opts = WEAPON_ORDER.map(w => ({ type:'weapon', weapon:w, icon:WEAPONS[w].icon, label:WEAPONS[w].label }));
    if (this.def.id === 'chara_math') opts.push({ type:'math', icon:'🧮', label:'算数' });
    if (this.def.id === 'chara_time') opts.push({ type:'time', icon:'⏱', label:'時間停止' });
    if (this.def.id === 'chara_slow') opts.push({ type:'slow', icon:'🐌', label:'スロー' });
    if (this.def.id === 'chara_q2')   opts.push({ type:'draw', icon:'✏️', label:'線を描く' });
    opts.push({ type:'bare', icon:'✊', label:'素手に戻す' });
    return opts;
  }
  applyBoxSelection(world) {
    const opts = this.boxOptions(), o = opts[this.boxSel];
    if (!o) { this.boxOpen = false; return; }
    if (o.type === 'weapon') { this.weapon = o.weapon; this.boxOpen = false; Sound.play('se_item_equip'); }
    else if (o.type === 'bare') { this.weapon = 'bare'; this.boxOpen = false; Sound.play('se_item_equip'); }
    else if (o.type === 'math') {
      this.boxOpen = false;
      if (this.mathCooldown > 0) { Sound.play('se_item_close'); return; }
      const opp = world.fighters.filter(f => f !== this && !f.dead);
      if (opp.length === 0) return;
      this.mathSelecting = true; this.mathTargetIdx = 0; Sound.play('se_item_open');
    }
    else if (o.type === 'time') {
      this.boxOpen = false;
      if (this.timeCooldown > 0) { Sound.play('se_item_close'); return; }
      this.timeCooldown = TIME_CD;
      for (const other of world.fighters) { if (other !== this && !other.dead) other.timeStopped = TIME_STOP; }  // 全員の時間を止める
      world.timeStopFlash = 30;       // 画面演出
      Sound.play('se_timestop');
    }
    else if (o.type === 'slow') {
      this.boxOpen = false;
      if (this.slowCooldown > 0) { Sound.play('se_item_close'); return; }
      this.slowCooldown = SLOW_CD;
      for (const other of world.fighters) { if (other !== this && !other.dead) other.slowed = SLOW_DUR; }  // 全員を鈍化
      Sound.play('se_slow');
    }
    else if (o.type === 'draw') {
      this.boxOpen = false;
      this.drawing = true;                 // 無防備で行動不能になり、描画モードへ
      if (this.isHuman && typeof Game !== 'undefined') Game.drawMode = this;  // 自端末で描画UIを開く
      Sound.play('se_item_open');
    }
  }
  confirmMathTarget(t) {
    this.mathSelecting = false;
    if (!t || t.dead) return;
    this.mathCooldown = 480;              // 8秒CD
    t.applyMathFreeze();
    Sound.play('se_special_activate');
  }
  applyMathFreeze() {
    this.mathFrozen = true; this.mathProblem = genMathProblem(); this.mathTimer = 0; this.mathWrongFlash = 0;
  }
  solveMath() { this.mathFrozen = false; this.mathProblem = null; Sound.play('se_special_ready'); }
  nextMathProblem() { this.mathProblem = genMathProblem(); this.mathWrongFlash = 14; Sound.play('se_item_close'); }
  submitMathAnswer(v) {
    if (!this.mathFrozen || !this.mathProblem) return;
    if (v === this.mathProblem.answer) this.solveMath(); else this.nextMathProblem();
  }

  // クライアント側予測：自キャラの移動・ジャンプ・重力だけローカルで即時反映（入力遅延の解消）
  predictStep(ctrl) {
    const dx = ctrl.dirX();
    if (dx !== 0) { this.vx = lerp(this.vx, dx * this.moveSpeed, 0.4); this.facing = dx; }
    else this.vx *= this.grounded ? FRICTION_G : FRICTION_A;
    if (ctrl.edge.X && this.jumpsLeft > 0) { this.vy = JUMP_V; this.jumpsLeft--; this.grounded = false; }
    this.vy += GRAVITY; if (this.vy > 22) this.vy = 22;
    const prevFeet = this.y;
    this.x += this.vx; this.y += this.vy;
    this.grounded = false;
    if (this.vy >= 0) {
      for (const p of PLATFORMS) {
        if (this.x > p.x1 - 14 && this.x < p.x2 + 14 && prevFeet <= p.y + 6 && this.y >= p.y && this.y - this.vy <= p.y + 8) {
          this.y = p.y; this.vy = 0; this.grounded = true; break;
        }
      }
    }
    if (this.grounded) this.jumpsLeft = this.def.jumps;
  }

  /* ---- 入力適用（人間 or CPU が held/edge を直接セットする想定。ここでは状態更新のみ） ---- */
  update(world, ctrl) {
    if (this.dead) return;

    if (this.respawnTimer > 0) { this.respawnTimer--; if (this.respawnTimer === 0) this.reset(SPAWN[0]); return; }
    // 時間停止中：いかなる操作・物理も行わずその場で完全停止（自分の時間も止まる）
    if (this.timeStopped > 0) {
      this.timeStopped--; this.vx = 0; this.vy = 0;
      if (this.timeStopped === 0) Sound.play('se_timeresume');
      return;
    }
    if (this.invuln > 0) this.invuln--;
    if (this.hitstun > 0) this.hitstun--;
    if (this.spActive > 0) this.spActive--;
    if (this.spCooldown > 0) { this.spCooldown--; if (this.spCooldown === 0) Sound.play('se_special_ready'); }
    if (this.comboTimer > 0) this.comboTimer--; else this.comboStep = 0;
    if (this.mathCooldown > 0) this.mathCooldown--;
    if (this.timeCooldown > 0) this.timeCooldown--;
    if (this.slowCooldown > 0) this.slowCooldown--;
    if (this.slowed > 0) this.slowed--;
    // ネット越しの描画入力（リモートQ2のストローク/描画終了をホストで反映）
    if (ctrl) {
      if (ctrl.drawNew) { ctrl.drawNew = false; if (this.drawing && ctrl.drawPts && ctrl.drawPts.length >= 2) { world.doodles.push(new Doodle(ctrl.drawPts, this)); if (world.doodles.length > 10) world.doodles.shift(); } }
      if (ctrl.endDrawNew) { ctrl.endDrawNew = false; this.drawing = false; }
    }

    // ---- シールド（Bボタン）状態更新 ----
    if (this.guardBreak > 0) {
      this.guardBreak--;
      if (this.guardBreak === 0) this.shield = SHIELD_MAX * 0.6;   // 復帰時に一部回復
    }
    const canShield = this.hitstun <= 0 && this.guardBreak <= 0 && !this.boxOpen && this.grounded && !this.attack
                      && !this.mathFrozen && !this.mathSelecting && !this.drawing;
    this.shielding = canShield && !!ctrl.held.B && this.shield > 0;
    if (this.shielding) {
      this.shield -= SHIELD_DRAIN;
      if (this.shield <= 0) this.breakGuard();
    } else if (this.guardBreak <= 0 && this.shield < SHIELD_MAX) {
      this.shield = Math.min(SHIELD_MAX, this.shield + SHIELD_REGEN);
    }
    if (this.mathWrongFlash > 0) this.mathWrongFlash--;

    const controllable = this.hitstun <= 0 && !this.boxOpen && this.guardBreak <= 0 && !this.shielding
                         && !this.mathFrozen && !this.mathSelecting && !this.drawing;

    // ---- アイテムボックス操作（設計書 7） ----
    if (this.drawing) {
      this.vx *= FRICTION_G;               // お絵かき中：無防備で行動不能（その場で停止）
    } else if (this.boxOpen) {
      this.vx *= FRICTION_G;
      const n = this.boxOptions().length;
      if (ctrl.edge.left)  { this.boxSel = (this.boxSel + n - 1) % n; Sound.play('se_ui_select'); }
      if (ctrl.edge.right) { this.boxSel = (this.boxSel + 1) % n; Sound.play('se_ui_select'); }
      if (ctrl.edge.A) this.applyBoxSelection(world);   // 装備/算数を実行して閉じる
      if (ctrl && ctrl.boxPickNew) { ctrl.boxPickNew = false; this.boxSel = ctrl.boxPickVal % n; this.applyBoxSelection(world); }
    } else if (this.mathSelecting) {
      // 算数の対象を選ぶ（左右で切替・Aで決定・Bでキャンセル）
      this.vx *= FRICTION_G;
      const opp = world.fighters.filter(f => f !== this && !f.dead);
      if (opp.length === 0) { this.mathSelecting = false; }
      else {
        this.mathTargetIdx = ((this.mathTargetIdx % opp.length) + opp.length) % opp.length;
        if (ctrl.edge.left)  this.mathTargetIdx = (this.mathTargetIdx + opp.length - 1) % opp.length;
        if (ctrl.edge.right) this.mathTargetIdx = (this.mathTargetIdx + 1) % opp.length;
        if (ctrl.edge.A) this.confirmMathTarget(opp[this.mathTargetIdx]);
        if (ctrl.edge.B) this.mathSelecting = false;
        if (ctrl && ctrl.mathTgtNew) { ctrl.mathTgtNew = false; this.confirmMathTarget(opp[ctrl.mathTgtVal % opp.length]); }
      }
    } else if (this.mathFrozen) {
      // 出題されて静止。CPUは自動回答、回答UIは描画側（人間）
      this.vx *= FRICTION_G;
      if (this.isBot) {
        this.mathTimer++;
        if (this.mathTimer >= 100) { this.mathTimer = 0; if (Math.random() < 0.55) this.solveMath(); else this.nextMathProblem(); }
      } else if (ctrl && ctrl.mathAnsNew) {
        ctrl.mathAnsNew = false; this.submitMathAnswer(ctrl.mathAnsVal);
      }
    } else if (this.shielding) {
      this.vx *= FRICTION_G;            // シールド中は動けない
    } else if (this.guardBreak > 0) {
      this.vx *= FRICTION_G;            // ガード割れ：行動不能
    } else if (controllable) {
      // ---- A：ボックスを開く ----
      if (ctrl.edge.A) { this.boxOpen = true; this.boxSel = 0; Sound.play('se_item_open'); }
      // ---- 移動（左スティックの倒し具合に応じてアナログ移動） ----
      const dx = (ctrl.moveX ? ctrl.moveX() : ctrl.dirX());
      if (Math.abs(dx) > 0.05) {
        this.vx = lerp(this.vx, dx * this.moveSpeed, 0.4);
        this.facing = dx > 0 ? 1 : -1;
      } else {
        this.vx *= this.grounded ? FRICTION_G : FRICTION_A;
      }
      // ---- X：ジャンプ（最大3〜4段。スロー中はジャンプ力も0.4倍） ----
      if (ctrl.edge.X && this.jumpsLeft > 0) {
        this.vy = JUMP_V * (this.slowed > 0 ? SLOW_FACTOR : 1); this.jumpsLeft--; this.grounded = false;
        const used = this.def.jumps - this.jumpsLeft;
        Sound.play(used === 1 ? 'se_jump' : used === 2 ? 'se_jump2' : 'se_jump3');
      }
      // ---- SP：スペシャル（設計書 8） ----
      if (ctrl.edge.SP && this.spCooldown <= 0 && this.spActive <= 0) {
        this.spActive = 600;            // 10秒 @60fps
        this.spCooldown = 1200;         // 20秒
        Sound.play('se_special_activate');
      }
      // ---- Y：攻撃 ----
      if (ctrl.edge.Y && (!this.attack)) this.startAttack(ctrl.dir(), world);
    } else {
      this.vx *= this.grounded ? FRICTION_G : FRICTION_A;
    }

    // ---- 攻撃の進行 ----
    if (this.attack) {
      this.attack.t++;
      if (this.attack.fwd) this.vx = this.facing * this.attack.fwd * (1 - this.attack.t / this.attack.dur);
      if (this.attack.t >= this.attack.dur) this.attack = null;
    }

    // ---- 物理 ----
    this.vy += GRAVITY;
    if (this.vy > 22) this.vy = 22;
    const prevFeet = this.y;
    this.x += this.vx;
    this.y += this.vy;

    // ---- プラットフォーム衝突（一方通行：下からはすり抜け・設計書 10） ----
    this.grounded = false;
    if (this.vy >= 0) {
      for (const p of PLATFORMS) {
        if (this.x > p.x1 - 14 && this.x < p.x2 + 14 && prevFeet <= p.y + 6 && this.y >= p.y && this.y - this.vy <= p.y + 8) {
          this.y = p.y; this.vy = 0; this.grounded = true; break;
        }
      }
    }
    if (this.grounded) {
      if (this.jumpsLeft < this.def.jumps && this.vy === 0 && this._wasAir) Sound.play('se_land');
      this.jumpsLeft = this.def.jumps;
    }
    this._wasAir = !this.grounded;

    // ---- 場外バースト判定（設計書 11） ----
    if (this.invuln <= 0 && (this.x < STAGE.blastL || this.x > STAGE.blastR || this.y > STAGE.blastBottom || this.y < STAGE.blastTop)) {
      this.burst(world);
    }

    this.updateAnim(ctrl);
  }

  burst(world) {
    Sound.play('se_burst');
    this.stocks--;
    Sound.play('se_stock_lost');
    this.damage = 0;                     // ストック消失でリセット（設計書 11）
    if (this.stocks <= 0) {
      this.stocks = 0; this.dead = true;
      world.onPlayerOut(this);
    } else {
      this.x = -9999;                    // 一旦退避
      this.respawnTimer = 70;
      this.vx = this.vy = 0;
    }
  }

  startAttack(dir, world) {
    const wk = this.weapon;
    // 素手ニュートラルは3段コンボ（設計書 6.1）
    if (wk === 'bare' && dir === 'none' && this.grounded) {
      const step = this.comboStep % 3;
      const dmgs = [3, 3, 6], kb = [2, 2.5, 7], kbg = [0.02, 0.02, 0.11];
      const move = { name:'3段パンチ', dmg:dmgs[step], kb:kb[step], kbg:kbg[step],
                     reach:50, h:55, isCombo:true, knockback: step === 2 };
      this.spawnAttack(move, dir, world);
      this.comboStep = step + 1; this.comboTimer = 28;
      Sound.play(step === 0 ? 'se_punch1' : step === 1 ? 'se_punch2' : 'se_punch3_kb');
      return;
    }
    let key = dir;
    const tbl = WEAPONS[wk].attacks;
    if (!this.grounded && tbl.air) key = 'air';          // 空中はair優先
    else if (!tbl[key]) key = tbl.none ? 'none' : 'side';
    const move = tbl[key];
    if (!move) return;
    if (move.airOnly && this.grounded) return;
    if (move.groundOnly && !this.grounded) return;
    this.spawnAttack(move, key, world);
    // 効果音（武器別・設計書 15.2）
    if (move.proj) Sound.play('se_gun_shot');
    else if (wk === 'tachi' || wk === 'daiken') Sound.play('se_sword_swing');
    else if (wk === 'lance') Sound.play('se_lance_thrust');
    else if (wk === 'glove') Sound.play('se_glove_hit');
    else Sound.play('se_punch2');
  }

  spawnAttack(move, dir, world) {
    const startup = move.startup || 4;
    this.attack = { move, dir, t:0, dur: startup + 12, active:[startup, startup+9],
                    hit:new Set(), weapon:this.weapon, fwd: move.fwd || 0 };
    this.state = dir === 'air' ? 'atk_air' : ('atk_' + (dir === 'none' ? 'n' : dir));
    // 飛び道具
    if (move.proj) {
      const n = move.parts || 1;
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          if (this.dead) return;
          let vy = 0, vx = this.facing * 16;
          if (move.proj === 'up') { vx = this.facing * 12; vy = -10; }
          if (move.proj === 'down') { vx = this.facing * 12; vy = 10; }
          world.projectiles.push(new Projectile(this, this.x + this.facing * 24, this.y - 38, vx, vy, move));
          Sound.play('se_gun_shot');
        }, i * 90);
      }
    }
  }

  // 攻撃の当たり判定（近接）
  attackHitbox() {
    if (!this.attack) return null;
    const a = this.attack;
    if (a.t < a.active[0] || a.t > a.active[1]) return null;
    if (a.move.proj) return null;
    const reach = a.move.reach || 50, h = a.move.h || 55;
    const x = this.facing > 0 ? this.x : this.x - reach;
    let yTop = this.y - 60;
    if (a.dir === 'up') yTop = this.y - 60 - (h - 55);
    if (a.dir === 'down') yTop = this.y - 30;
    return { x: x, y: yTop, w: reach, h: h };
  }

  breakGuard() {
    this.shield = 0; this.shielding = false;
    this.guardBreak = GUARD_BREAK_STUN;     // 2秒間行動不能
    this.vx = 0;
    Sound.play('se_stock_lost');
    spawnHitSpark(this.x, this.y - 40);
  }

  receiveHit(move, attacker, world) {
    if (this.invuln > 0 || this.dead || this.respawnTimer > 0) return;
    // ---- シールドで防御：ダメージ/吹っ飛び無効、耐久を削る ----
    if (this.shielding && this.guardBreak <= 0) {
      this.shield -= (move.dmg * SHIELD_HIT_FACTOR);
      const dir = (attacker.x <= this.x) ? 1 : -1;
      this.vx = dir * 2;                     // わずかに押される
      Sound.play('se_weapon_hit');
      spawnHitSpark(this.x + dir * 18, this.y - 40);
      if (this.shield <= 0) this.breakGuard();
      return;
    }
    const dealt = move.dmg * attacker.def.atk;
    this.damage += dealt * this.def.def;           // 与ダメ×攻撃倍率, 被ダメ×防御倍率（設計書 5）
    // 吹っ飛び（設計書 9）：dist = (kb + dmg% × kbg) / 体重 × 100 × 被ダメ係数
    const mag = (move.kb + this.damage * (move.kbg || 0.08)) * (100 / this.def.weight) * this.def.def;
    const dir = (attacker.x <= this.x) ? 1 : -1;
    let ux = dir, uy = -0.5;
    if (move.up) uy = -1.4;
    if (move.spike) uy = 1.2;
    const len = Math.hypot(ux, uy);
    this.vx = (ux / len) * mag;
    this.vy = (uy / len) * mag;
    this.hitstun = Math.min(8 + Math.floor(mag * 1.2), 50);
    this.facing = -dir;                            // 吹っ飛んだ方向に向く（設計書 18）
    this.grounded = false;
    // 効果音
    if (move.proj) Sound.play('se_gun_hit');
    else if (attacker.weapon !== 'bare') Sound.play('se_weapon_hit');
    else if (move.knockback) Sound.playHitWithDamage(this.damage);
    else Sound.play('se_punch1');
    spawnHitSpark(this.x, this.y - 40);
  }

  /* ---- アニメーション（設計書 17.2） ---- */
  updateAnim(ctrl) {
    this.animT += 1;
    const moving = Math.abs(this.vx) > 0.6;
    let st;
    if (this.netMode) {
      // クライアント：ホストから受信した state をそのまま使う（ローカル物理は無し）
      st = this.state || 'idle';
    } else {
      st = 'idle';
      if (this.guardBreak > 0) st = 'guardbreak';
      else if (this.shielding) st = 'shield';
      else if (this.hitstun > 0) st = this.vy < -3 || Math.abs(this.vx) > 6 ? 'launched' : 'hitstun';
      else if (this.attack) st = this.state;
      else if (!this.grounded) st = this.vy < 0 ? 'jump_up' : 'jump_air';
      else if (moving) st = 'run';
      this.state = st;
    }

    const t = this.animT;
    const P = this.pose;
    if (st === 'idle') {
      P.bob = Math.sin(t * 0.09) * 2; P.lArm = 18; P.rArm = 18;
      P.lThigh = 3; P.rThigh = -3; P.lShin = 6; P.rShin = 6; P.lean = 0;
    } else if (st === 'run') {
      const phase = t * 0.35 * (this.moveSpeed / 5);
      const swing = Math.sin(phase) * 35;          // 太もも±35°（設計書 17.2）
      P.lThigh = swing; P.rThigh = -swing;
      P.lShin = swing > 0 ? swing * 0.6 : -swing * 0.3;
      P.rShin = swing < 0 ? -swing * 0.6 : swing * 0.3;
      P.lArm = -swing * 0.7 + 15; P.rArm = swing * 0.7 + 15; // 腕は逆位相
      P.lean = 10; P.bob = Math.abs(Math.sin(phase)) * 2;
    } else if (st === 'jump_up') {
      P.lThigh = 30; P.rThigh = 20; P.lShin = 40; P.rShin = 35; P.lArm = 120; P.rArm = 120; P.lean = 0; P.bob = 0;
    } else if (st === 'jump_air') {
      P.lThigh = 18; P.rThigh = -18; P.lShin = 20; P.rShin = 20; P.lArm = 60; P.rArm = 60; P.lean = 0;
    } else if (st === 'hitstun') {
      P.lArm = 70; P.rArm = 70; P.lean = -25; P.lThigh = -10; P.rThigh = 10; P.lShin = 10; P.rShin = 10;
    } else if (st === 'launched') {
      // 全身回転は描画側で spin
      P.lArm = 100; P.rArm = -40; P.lThigh = 40; P.rThigh = -20; P.lShin = 10; P.rShin = 30; P.lean = -20;
    } else if (st === 'shield') {
      // やや屈んで両腕を前に構える
      P.lArm = 58; P.rArm = 58; P.lean = 6; P.lThigh = 14; P.rThigh = -14; P.lShin = 20; P.rShin = 20; P.bob = 0;
    } else if (st === 'guardbreak') {
      // ふらつき（行動不能）
      P.lArm = 28; P.rArm = -28; P.lean = Math.sin(t * 0.5) * 16; P.lThigh = 6; P.rThigh = -6; P.lShin = 8; P.rShin = 8; P.bob = 0;
    } else {
      // 攻撃ポーズ（即時反映：キビキビ感・設計書 17.2）
      this.applyAttackPose(P, st);
    }

    // 攻撃は即時、それ以外は補間
    const k = (st.startsWith('atk') ) ? 1 : 0.25;
    for (const key of ['lArm','rArm','lThigh','rThigh','lShin','rShin','lean','bob']) {
      this.cur[key] = lerp(this.cur[key], P[key], k);
    }
    // 向き補間（設計書 18）
    this.curFlipX = lerp(this.curFlipX, this.facing, 0.18);
    if (Math.abs(this.curFlipX - this.facing) < 0.02) this.curFlipX = this.facing;
  }

  applyAttackPose(P, st) {
    P.lThigh = 5; P.rThigh = -5; P.lShin = 6; P.rShin = 6; P.bob = 0;
    switch (st) {
      case 'atk_n':  P.rArm = 95; P.lArm = 10; P.lean = 12; break;
      case 'atk_side': P.rArm = 92; P.lArm = 92; P.lean = 25; break;
      case 'atk_up': P.rArm = 175; P.lArm = 160; P.lean = -10; break;
      case 'atk_down': P.rArm = 30; P.lArm = 20; P.lean = 30; P.lThigh = 40; P.rThigh = -40; break;
      case 'atk_air': P.rArm = 130; P.lArm = 50; P.lean = 0; break;
      default: P.rArm = 95; P.lArm = 15; P.lean = 12;
    }
  }
}

/* ======================= 7. Projectile（銃弾） ======================= */
class Projectile {
  constructor(owner, x, y, vx, vy, move) {
    this.owner = owner; this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.move = move; this.life = 70; this.dead = false;
  }
  update(world) {
    this.x += this.vx; this.y += this.vy;
    if (this.move.proj === 'up' || this.move.proj === 'down') this.vy += 0.3;
    this.life--;
    if (this.life <= 0 || this.x < -50 || this.x > W + 50 || this.y > H + 50) this.dead = true;
    for (const f of world.fighters) {
      if (f === this.owner || f.dead || f.respawnTimer > 0 || f.invuln > 0) continue;
      const r = f.bodyRect();
      if (this.x > r.x && this.x < r.x + r.w && this.y > r.y && this.y < r.y + r.h) {
        f.receiveHit(this.move, this.owner, world);
        this.dead = true; break;
      }
    }
  }
  draw(ctx) {
    ctx.fillStyle = '#ffe066';
    ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,0.4)';
    ctx.fillRect(this.x - this.vx, this.y - 2, this.vx, 4);
  }
}

/* ======================= 7.5 Doodle（Q2の白線：落下して転がる障害物） ======================= */
class Doodle {
  // pts: ワールド座標の点列, owner: 描いた本人（ノックバック免除）
  constructor(pts, owner) {
    let cx = 0, cy = 0; for (const p of pts) { cx += p.x; cy += p.y; } cx /= pts.length; cy /= pts.length;
    this.x = cx; this.y = cy;
    this.pts = pts.map(p => ({ x: p.x - cx, y: p.y - cy }));   // 中心からの相対座標
    let r = 8; for (const p of this.pts) r = Math.max(r, Math.hypot(p.x, p.y));
    this.radius = r;
    this.ownerEid = owner ? owner.eid : -1;
    this.vx = 0; this.vy = 0; this.angle = 0; this.angVel = 0;
    this.grounded = false; this.life = 600;          // 約10秒で消滅
    this.hitCd = {};                                 // eid -> 連続ヒット防止
  }
  update(world) {
    this.life--;
    if (!this.grounded) {
      this.vy += GRAVITY * 0.5; this.x += this.vx; this.y += this.vy;
      if (this.vy >= 0 && this.x > STAGE.main.x1 && this.x < STAGE.main.x2 && this.y + this.radius >= STAGE.main.y) {
        this.y = STAGE.main.y - this.radius; this.vy = 0; this.grounded = true;
        this.angVel = (Math.random() < 0.5 ? -1 : 1) * 0.07;   // 着地で転がり出す
      }
    } else {
      this.vx = this.angVel * this.radius;           // 転がり：回転と移動を連動
      this.x += this.vx; this.angle += this.angVel;
      this.angVel *= 0.99; if (Math.abs(this.angVel) < 0.004) this.angVel = 0;
      if (this.x < STAGE.main.x1 || this.x > STAGE.main.x2) this.grounded = false;  // 端から落下
    }
    if (this.x < STAGE.blastL - 60 || this.x > STAGE.blastR + 60 || this.y > STAGE.blastBottom + 100) this.life = 0;
    // 当たり判定（本人以外を少しノックバック）
    for (const f of world.fighters) {
      if (f.dead || f.respawnTimer > 0 || f.eid === this.ownerEid) continue;
      if ((this.hitCd[f.eid] || 0) > 0) { this.hitCd[f.eid]--; continue; }
      const r = f.bodyRect();
      const dx = Math.max(r.x - this.x, 0, this.x - (r.x + r.w));
      const dy = Math.max(r.y - this.y, 0, this.y - (r.y + r.h));
      if (Math.hypot(dx, dy) < this.radius - 2) {
        const dir = (this.x <= f.x) ? 1 : -1;
        f.vx = dir * 5; f.vy = -3; f.hitstun = Math.max(f.hitstun, 8); f.facing = -dir;
        this.hitCd[f.eid] = 24;
        Sound.play('se_punch1');
      }
    }
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y); ctx.rotate(this.angle);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (this.life < 90) ctx.globalAlpha = this.life / 90;   // 消滅前にフェード
    ctx.beginPath();
    this.pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.stroke();
    ctx.restore();
  }
}

/* ======================= 8. ヒットスパーク ======================= */
const sparks = [];
function spawnHitSpark(x, y) { sparks.push({ x, y, t: 0, life: 14 }); }
function updateSparks() { for (let i = sparks.length - 1; i >= 0; i--) { if (++sparks[i].t >= sparks[i].life) sparks.splice(i, 1); } }
function drawSparks(ctx) {
  for (const s of sparks) {
    const p = s.t / s.life, r = 8 + p * 22;
    ctx.strokeStyle = `rgba(255,${200 - p * 150},80,${1 - p})`;
    ctx.lineWidth = 3;
    for (let a = 0; a < 6; a++) {
      const ang = a * Math.PI / 3 + p;
      ctx.beginPath();
      ctx.moveTo(s.x + Math.cos(ang) * r * 0.4, s.y + Math.sin(ang) * r * 0.4);
      ctx.lineTo(s.x + Math.cos(ang) * r, s.y + Math.sin(ang) * r);
      ctx.stroke();
    }
  }
}

/* ======================= 9. 棒人間レンダラ（設計書 17） ======================= */
function drawLeg(ctx, hipX, hipY, thighAngle, shinBend, thighLen, shinLen) {
  const ta = thighAngle * Math.PI / 180;
  const kneeX = hipX + Math.sin(ta) * thighLen;
  const kneeY = hipY + Math.cos(ta) * thighLen;
  const sa = (thighAngle + shinBend) * Math.PI / 180;
  const footX = kneeX + Math.sin(sa) * shinLen;
  const footY = kneeY + Math.cos(sa) * shinLen;
  ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(kneeX, kneeY); ctx.lineTo(footX, footY); ctx.stroke();
}
function drawArm(ctx, shX, shY, angle, len) {
  // angle: 0=真下, 90=前方水平(+x), 180=真上
  const a = angle * Math.PI / 180;
  const fx = shX + Math.sin(a) * len, fy = shY - Math.cos(a) * len;
  ctx.beginPath(); ctx.moveTo(shX, shY); ctx.lineTo(fx, fy); ctx.stroke();
}
function drawCharacter(ctx, f) {
  const c = f.cur;
  ctx.save();
  ctx.translate(f.x, f.y - c.bob);
  ctx.scale(f.curFlipX, 1);

  // 吹っ飛び中は全身回転（設計書 17.2 launched）
  if (f.state === 'launched') ctx.rotate(Math.sin(f.animT * 0.4) * 0.9);

  ctx.strokeStyle = f.color();
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // SP発動中：光らせる（設計書 8）
  if (f.spActive > 0) { ctx.shadowColor = f.color(); ctx.shadowBlur = 18; }
  // 無敵点滅
  if (f.invuln > 0 && Math.floor(f.invuln / 4) % 2 === 0) ctx.globalAlpha = 0.4;

  const hipY = -FOOT;                 // 腰
  const leanRad = c.lean * Math.PI / 180;
  const neckY = hipY - 28;            // 胴体長28
  const neckX = Math.sin(leanRad) * 28;
  // 脚（腰オフセット±5・設計書 17.1/17.2）
  drawLeg(ctx, -5, hipY, c.lThigh, c.lShin, 13, 12);
  drawLeg(ctx,  5, hipY, c.rThigh, c.rShin, 13, 12);
  // 胴体
  ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(neckX, neckY); ctx.stroke();
  // 腕（肩＝首付近）
  drawArm(ctx, neckX, neckY + 4, c.lArm + c.lean, 20);
  drawArm(ctx, neckX, neckY + 4, c.rArm + c.lean, 20);
  // 武器の簡易表示
  drawWeaponInHand(ctx, f, neckX, neckY + 4, c.rArm + c.lean);
  // 頭
  const headX = neckX + Math.sin(leanRad) * 12, headY = neckY - 12;
  ctx.beginPath(); ctx.arc(headX, headY, 12, 0, Math.PI * 2); ctx.stroke();

  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // ---- シールド（バブル）描画：耐久に応じて大きさ・色が変化 ----
  if (f.shielding && f.shield > 0) {
    const ratio = Math.max(0, Math.min(1, f.shield / SHIELD_MAX));
    const r = 26 + ratio * 18;
    const hue = 120 * ratio;                       // 緑(満)→赤(減)
    ctx.save();
    ctx.fillStyle = `hsla(${hue},90%,55%,0.28)`;
    ctx.strokeStyle = `hsla(${hue},90%,65%,0.9)`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(f.x, f.y - 34, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  // ---- ガード割れ：頭上に「!」スタン表示 ----
  if (f.guardBreak > 0) {
    ctx.save();
    ctx.fillStyle = '#ffd166';
    ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center';
    const wob = Math.sin(f.animT * 0.4) * 6;
    ctx.fillText('💢', f.x + wob, f.y - 78);
    ctx.restore();
  }
  // ---- 時間停止中：青いオーラ＋時計マーク ----
  if (f.timeStopped > 0) {
    ctx.save();
    ctx.strokeStyle = 'rgba(120,200,255,0.8)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(f.x, f.y - 33, 22, 40, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#bfe6ff'; ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⏱', f.x, f.y - 80);
    ctx.restore();
  }
  // ---- 鈍化中：紫のオーラ＋カタツムリ ----
  else if (f.slowed > 0) {
    ctx.save();
    ctx.fillStyle = '#c9a8ff'; ctx.font = '22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🐌', f.x, f.y - 80);
    ctx.restore();
  }
}
function drawWeaponInHand(ctx, f, shX, shY, armAngle) {
  if (f.weapon === 'bare') return;
  const a = armAngle * Math.PI / 180;
  const hx = shX + Math.sin(a) * 20, hy = shY - Math.cos(a) * 20;
  ctx.save();
  ctx.translate(hx, hy);
  ctx.strokeStyle = '#cfd8e8'; ctx.fillStyle = '#cfd8e8'; ctx.lineWidth = 3;
  switch (f.weapon) {
    case 'gun':   ctx.fillRect(0, -3, 16, 6); break;
    case 'tachi': ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(30,-18); ctx.stroke(); break;
    case 'daiken':ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(34,-22); ctx.stroke(); break;
    case 'lance': ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(40,-6); ctx.stroke(); break;
    case 'glove': ctx.beginPath(); ctx.arc(8,-4,7,0,Math.PI*2); ctx.fill(); break;
  }
  ctx.restore();
}

/* ======================= 10. World（試合進行） ======================= */
class World {
  constructor(fighters, opts = {}) {
    this.fighters = fighters;
    this.projectiles = [];
    this.doodles = [];                    // Q2の白線（落書き）
    this.training = !!opts.training;
    this.over = false; this.winner = null;
    this.placements = [];                 // 脱落順（後ろが上位）
    let i = 0; for (const f of fighters) f.reset(SPAWN[i++ % SPAWN.length]);
  }
  onPlayerOut(f) {
    this.placements.push(f);
    if (this.training) return;            // トレーニングは脱落なし扱い
    const alive = this.fighters.filter(x => !x.dead);
    if (alive.length <= 1) {
      this.over = true;
      this.winner = alive[0] || f;
      Sound.play('se_win');
    }
  }
  update() {
    for (const f of this.fighters) {
      const ctrl = f.controller;          // 各fighterに割り当てた入力源
      ctrl.poll(f, this);                 // held/edge を更新
      f.update(this, ctrl);
    }
    // 近接ヒット解決
    for (const a of this.fighters) {
      const hb = a.attackHitbox(); if (!hb) continue;
      for (const b of this.fighters) {
        if (b === a || b.dead || a.attack.hit.has(b.eid)) continue;
        if (rectsOverlap(hb, b.bodyRect())) {
          a.attack.hit.add(b.eid);
          b.receiveHit(a.attack.move, a, this);
        }
      }
    }
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      this.projectiles[i].update(this);
      if (this.projectiles[i].dead) this.projectiles.splice(i, 1);
    }
    for (let i = this.doodles.length - 1; i >= 0; i--) {
      this.doodles[i].update(this);
      if (this.doodles[i].life <= 0) this.doodles.splice(i, 1);
    }
    updateSparks();
  }
}

// 人間：グローバル Input をそのまま使う
const HumanController = {
  edge:{}, held:{},
  poll(f) {
    this.edge = Input.edge; this.held = Input.held;
  },
  dirX(){ return Input.dirX(); },
  moveX(){ return Input.moveX(); },
  dir(){ return Input.dir(); },
};

// CPU（設計書 14）
class CPUController {
  constructor(mode) { this.mode = mode; this._held = {}; this.edge = {}; this.held = {}; this._t = Math.random()*100; }
  dirX(){ return this.held.right ? 1 : this.held.left ? -1 : 0; }
  moveX(){ return this.dirX(); }
  dir(){ if (this.held.up) return 'up'; if (this.held.down) return 'down'; if (this.held.left||this.held.right) return 'side'; return 'none'; }
  poll(self, world) {
    const prev = Object.assign({}, this.held);
    this.held = { left:false,right:false,up:false,down:false,X:false,Y:false,A:false,B:false,SP:false };
    this._t++;
    if (this.mode === 'static') { this.edge = {}; return; }   // 静止モード（設計書 14）

    // 最も近い敵
    let target = null, best = 1e9;
    for (const o of world.fighters) {
      if (o === self || o.dead || o.respawnTimer > 0) continue;
      const d = Math.abs(o.x - self.x); if (d < best) { best = d; target = o; }
    }
    if (target) {
      const dx = target.x - self.x;
      // 接近
      if (Math.abs(dx) > 60) { if (dx > 0) this.held.right = true; else this.held.left = true; }
      // 台に戻る／上の敵へジャンプ
      if (!self.grounded && self.y > STAGE.main.y - 30 && self.x > STAGE.main.x1 && self.x < STAGE.main.x2) {
        // 落下中：復帰ジャンプ
      }
      if ((self.x < STAGE.main.x1 || self.x > STAGE.main.x2) && self.y > 200 && this._t % 18 === 0) this.held.X = true; // 復帰
      if (target.y < self.y - 60 && this._t % 40 === 0) this.held.X = true;  // 上の敵へ
      // 攻撃（接触したら確率で）
      if (Math.abs(dx) < 70 && Math.abs(target.y - self.y) < 70) {
        if (Math.random() < 0.06) this.held.Y = true;
      }
      // 低確率で武器装備
      if (!self.boxOpen && Math.random() < 0.002) { this.held.A = true; this._wantEquip = 1 + Math.floor(Math.random()*5); }
      if (self.boxOpen) {
        // 適当に選んで装備
        if (Math.random() < 0.3) this.held.A = true;
      }
      // たまにSP
      if (self.spCooldown <= 0 && Math.random() < 0.003) this.held.SP = true;
    }
    this.edge = {};
    for (const k in this.held) this.edge[k] = this.held[k] && !prev[k];
  }
}

// リモート入力（ホスト側：他プレイヤーの入力をRTDBから反映）
class RemoteController {
  constructor() {
    this.held = { left:false,right:false,up:false,down:false,X:false,Y:false,A:false,B:false,SP:false };
    this.edge = {};
    this.data = null;
    this._c = { X:0, Y:0, A:0, B:0, SP:0 };   // 受信したボタン押下カウンタ
    this._bs = 0; this._ma = 0; this._mt = 0;  // 箱選択/算数回答/算数対象 のシーケンス
    this._dr = 0; this._ed = 0;                // 描画ストローク/描画終了 のシーケンス
  }
  setData(d) { this.data = d; }
  dirX(){ return (this.held.right?1:0) - (this.held.left?1:0); }
  moveX(){ return (this.ax != null) ? this.ax : this.dirX(); }  // ネット越しのアナログ横入力
  dir(){ if (this.held.up) return 'up'; if (this.held.down) return 'down'; if (this.held.left||this.held.right) return 'side'; return 'none'; }
  poll(self) {
    const d = this.data || {};
    const prev = Object.assign({}, this.held);
    // B（シールド）は長押し保持、それ以外はカウンタ増分でタップ検出
    this.held = { left:!!d.l, right:!!d.r, up:!!d.u, down:!!d.d, X:false, Y:false, A:false, B:!!d.sb, SP:false };
    this.ax = (d.ax != null) ? d.ax / 100 : (this.held.right ? 1 : this.held.left ? -1 : 0);  // アナログ横入力
    this.edge = {};
    for (const k of ['X','Y','A','SP']) {
      const c = d['c' + k] || 0;
      if (c > this._c[k]) { this.edge[k] = true; this.held[k] = true; }
      this._c[k] = c;
    }
    this.edge.left  = this.held.left  && !prev.left;
    this.edge.right = this.held.right && !prev.right;
    // タッチ操作（箱選択/算数）のシーケンス検出
    if ((d.bsSeq || 0) > this._bs) { this._bs = d.bsSeq; this.boxPickNew = true; this.boxPickVal = d.bs || 0; }
    if ((d.maSeq || 0) > this._ma) { this._ma = d.maSeq; this.mathAnsNew = true; this.mathAnsVal = d.ma || 0; }
    if ((d.mtSeq || 0) > this._mt) { this._mt = d.mtSeq; this.mathTgtNew = true; this.mathTgtVal = d.mt || 0; }
    if ((d.drSeq || 0) > this._dr) { this._dr = d.drSeq; this.drawNew = true; this.drawPts = (d.dr || []).map(p => ({ x: p[0], y: p[1] })); }
    if ((d.edSeq || 0) > this._ed) { this._ed = d.edSeq; this.endDrawNew = true; }
  }
}

/* ======================= 12. シーン管理 ======================= */
const Game = {
  canvas:null, ctx:null,
  scale:1, ox:0, oy:0,
  scene:'title',
  mode:'training',          // 'training' | 'versus'
  world:null,
  ui:[],                    // 当該フレームのボタン
  // 選択状態
  sel: { charIdx:0, colorIdx:0, botChar:2, botMode:'cpu', confirmed:false },
  versusPlayers: 4,
  countdown:0, countNum:3,
  resultTimer:0,
  // ネット
  net:null, room:null,

  init() {
    this.canvas = document.getElementById('game');
    this.ctx = this.canvas.getContext('2d');
    Input.init();
    this.bindPointers();
    this.resize();
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 250));
    // ビジュアルビューポート（アドレスバー開閉）に追従してCanvasを再配置
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => this.resize());
      window.visualViewport.addEventListener('scroll', () => this.resize());
    }
    requestAnimationFrame(() => this.loop());
  },
  resize() {
    // 実表示領域（visualViewport）にぴったり収める。Canvasを可視領域の中央に絶対配置し、
    // スマホ横画面でも下部UI（ボタン）が見切れないようにする
    const vv = window.visualViewport;
    const vw = (vv && vv.width)  || window.innerWidth;
    const vh = (vv && vv.height) || window.innerHeight;
    const offX = (vv && vv.offsetLeft) || 0;
    const offY = (vv && vv.offsetTop)  || 0;
    const s = Math.min(vw / W, vh / H);
    const cw = W * s, ch = H * s;
    const cv = this.canvas;
    cv.style.position = 'fixed';
    cv.style.left = Math.round(offX + (vw - cw) / 2) + 'px';
    cv.style.top  = Math.round(offY + (vh - ch) / 2) + 'px';
    cv.style.width = cw + 'px';
    cv.style.height = ch + 'px';
    if (window.scrollX || window.scrollY) window.scrollTo(0, 0);
    const r = cv.getBoundingClientRect();
    this.scale = s; this.ox = r.left; this.oy = r.top;
  },
  toCanvas(cx, cy) {
    const r = this.canvas.getBoundingClientRect();
    return { x: (cx - r.left) / this.scale, y: (cy - r.top) / this.scale };
  },
  bindPointers() {
    const cv = this.canvas;
    cv.addEventListener('pointerdown', e => {
      Sound.unlock();
      const p = this.toCanvas(e.clientX, e.clientY);
      // お絵かきモード中：ボタン以外のドラッグは描画開始
      if (this.scene === 'battle' && this.drawMode) {
        if (this.handleUIClick(p.x, p.y)) return;
        this.strokeStart(e.pointerId, p.x, p.y);
        return;
      }
      if (this.scene === 'battle') Input.onPointerDown(e.pointerId, p.x, p.y);
      this.handleUIClick(p.x, p.y);
    });
    cv.addEventListener('pointermove', e => {
      const p = this.toCanvas(e.clientX, e.clientY);
      if (this.scene === 'battle' && this.drawMode) { this.strokeMove(e.pointerId, p.x, p.y); return; }
      Input.onPointerMove(e.pointerId, p.x, p.y);
    });
    cv.addEventListener('pointerup',   e => { if (this.drawMode) this.strokeEnd(e.pointerId); Input.onPointerUp(e.pointerId); });
    cv.addEventListener('pointercancel', e => { if (this.drawMode) this.strokeEnd(e.pointerId); Input.onPointerUp(e.pointerId); });
  },
  handleUIClick(x, y) {
    if (this._errored) { this._errored = false; this.scene = 'title'; this.world = null; return true; }
    for (const b of this.ui) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        Sound.play('se_ui_decide'); b.action(); return true;
      }
    }
    return false;
  },
  /* ---- Q2 お絵かき：ストローク管理 ---- */
  strokeStart(id, x, y) { this._stroke = { id, pts: [{ x, y }] }; },
  strokeMove(id, x, y) {
    const s = this._stroke; if (!s || s.id !== id) return;
    const last = s.pts[s.pts.length - 1];
    if (Math.hypot(x - last.x, y - last.y) > 8) s.pts.push({ x, y });   // 8px間隔で点を追加
    if (s.pts.length > 80) s.pts.shift();
  },
  strokeEnd(id) {
    const s = this._stroke; if (!s || s.id !== id) { this._stroke = null; return; }
    this._stroke = null;
    if (s.pts.length >= 2 && this.world) {
      const owner = this.drawMode;
      if (this.world.netRole === 'client') { this._drawSend = { pts: s.pts, seq: (this._drawSeq = (this._drawSeq || 0) + 1) }; }
      else { this.world.doodles.push(new Doodle(s.pts, owner)); if (this.world.doodles.length > 10) this.world.doodles.shift(); }
      Sound.play('se_item_close');
    }
  },
  exitDrawMode() {
    if (this.drawMode) { this.drawMode.drawing = false; }
    if (this.world && this.world.netRole === 'client') this._endDraw = { seq: (this._endDrawSeq = (this._endDrawSeq || 0) + 1) };
    this.drawMode = null; this._stroke = null;
  },
  drawDrawingUI(ctx) {
    // 描画中のストローク
    if (this._stroke && this._stroke.pts.length) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); this._stroke.pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke();
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText('✏️ ドラッグで線を描く（離すと落ちて転がる）', W/2, 40);
    ctx.fillStyle = '#ff8080'; ctx.font = '16px sans-serif';
    ctx.fillText('描画中は無防備！', W/2, 66);
    this.btn(W - 180, H - 84, 160, 60, '完了', () => this.exitDrawMode(), { color:'#2e8b57', font:26 });
  },
  btn(x, y, w, h, label, action, opts = {}) {
    this.ui.push({ x, y, w, h, label, action, opts });
  },

  /* ---------- メインループ ---------- */
  loop() {
    try {
      Input.update();
      this.ui = [];
      const ctx = this.ctx;
      ctx.clearRect(0, 0, W, H);
      switch (this.scene) {
        case 'title':      this.sceneTitle(); break;
        case 'mode':       this.sceneModeSelect(); break;
        case 'charselect': this.sceneCharSelect(); break;
        case 'countdown':  this.sceneCountdown(); break;
        case 'battle':     this.sceneBattle(); break;
        case 'result':     this.sceneResult(); break;
        case 'help':       this.sceneHelp(); break;
      }
      this.drawButtons();
    } catch (err) {
      // 例外で「グレー画面のまま無反応」になるのを防ぎ、原因を画面に出す
      this.drawError(err);
      console.error('[スンマ戦] loop error:', err);
    }
    requestAnimationFrame(() => this.loop());
  },

  drawError(err) {
    const ctx = this.ctx;
    ctx.fillStyle = '#220000'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff6b6b'; ctx.textAlign = 'left'; ctx.font = 'bold 28px monospace';
    ctx.fillText('⚠ エラーが発生しました（scene: ' + this.scene + '）', 40, 80);
    ctx.fillStyle = '#fff'; ctx.font = '18px monospace';
    const msg = (err && (err.stack || err.message || String(err))) || 'unknown';
    msg.split('\n').slice(0, 12).forEach((line, i) => ctx.fillText(line.slice(0, 110), 40, 130 + i * 26));
    ctx.fillStyle = '#9fb3d1'; ctx.font = '16px sans-serif';
    ctx.fillText('画面をタップ/クリックでタイトルに戻ります', 40, H - 50);
    this._errored = true;
  },

  drawButtons() {
    const ctx = this.ctx;
    for (const b of this.ui) {
      if (b.opts.bare) continue;          // bareは独自描画
      ctx.fillStyle = b.opts.color || (b.opts.sel ? '#3a6ea5' : '#26324d');
      roundRect(ctx, b.x, b.y, b.w, b.h, 10); ctx.fill();
      ctx.strokeStyle = b.opts.sel ? '#ffd166' : '#4a5a7a'; ctx.lineWidth = b.opts.sel ? 4 : 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = (b.opts.font || 26) + 'px sans-serif';
      ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
    }
  },

  /* ---------- キャラ選択（設計書 3.2 / 17.3） ---------- */

      drawPreviewFighter(ctx, x + cw/2, y + 150, cid, COLORS[this.sel.colorIdx].std);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';

      ctx.fillStyle = '#9fb3d1'; ctx.font = '15px sans-serif';
      ctx.fillText('特性: ' + c.trait, x + cw/2, y + 200);

      this.btn(x, y, cw, 230, '', () => { this.sel.charIdx = i; Sound.play('se_ui_select'); }, { bare:true });
    });

    // 選択中キャラの説明（名前の下＝カードの下に軽く表示）
    const selDef = CHARS[CHAR_ORDER[this.sel.charIdx]];
    if (selDef && selDef.desc) {
