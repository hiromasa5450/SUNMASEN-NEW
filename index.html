      ctx.fillText('▶ ' + selDef.name + '：' + selDef.desc, W/2, 372);
    }

    // カラーパレット8色（設計書 17.3）
    ctx.fillStyle = '#fff'; ctx.font = '22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('カラー選択', W/2, 405);
    const sw = 64, sg = 14, tw = COLORS.length * sw + (COLORS.length - 1) * sg;
    let cx = (W - tw) / 2;
    COLORS.forEach((col, i) => {
      const x = cx + i * (sw + sg), y = 420;
      ctx.fillStyle = col.std; roundRect(ctx, x, y, sw, sw, 8); ctx.fill();
      if (this.sel.colorIdx === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.stroke(); }
      this.btn(x, y, sw, sw, '', () => { this.sel.colorIdx = i; Sound.play('se_ui_select'); }, { bare:true });
    });

    // トレーニング時：ボットの設定
    if (this.mode === 'training') {
      ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('ボット設定', W/2, 540);
      this.btn(W/2 - 250, 555, 230, 50, 'ボット:静止', () => { this.sel.botMode = 'static'; }, { sel: this.sel.botMode === 'static' });
      this.btn(W/2 + 20, 555, 230, 50, 'ボット:CPU', () => { this.sel.botMode = 'cpu'; }, { sel: this.sel.botMode === 'cpu' });
    } else {
      ctx.fillStyle = '#9fb3d1'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('対戦: あなた + CPU3体（オンライン未設定のためローカル対戦）', W/2, 545);
    }

    // 決定
    this.btn(W/2 - 130, 630, 260, 64, '決定', () => this.startMatch(), { color:'#2e8b57', font:30 });
    this.btn(40, 30, 130, 50, '← 戻る', () => { this.scene = 'title'; }, { font:22 });
  },

  startMatch() {
    const charId = CHAR_ORDER[this.sel.charIdx];
    const fighters = [];
    const human = new Fighter(charId, this.sel.colorIdx, { human:true, label:'P1' });
    human.controller = HumanController;
    fighters.push(human);

    if (this.mode === 'training') {
      const bot = new Fighter(CHAR_ORDER[this.sel.botChar], 1, { bot:true, botMode:this.sel.botMode, label:'BOT' });
      bot.controller = new CPUController(this.sel.botMode);
      fighters.push(bot);
    } else {
      const used = new Set([this.sel.colorIdx]);
      for (let i = 1; i < this.versusPlayers; i++) {
        let ci; do { ci = Math.floor(Math.random()*8); } while (used.has(ci) && used.size < 8); used.add(ci);
        const bc = CHAR_ORDER[(this.sel.charIdx + i) % CHAR_ORDER.length];
        const bot = new Fighter(bc, ci, { bot:true, botMode:'cpu', label:'CPU'+i });
        bot.controller = new CPUController('cpu');
        fighters.push(bot);
      }
    }
    this.world = new World(fighters, { training: this.mode === 'training' });
    this.drawMode = null; this._stroke = null;
    this.countdown = 0; this.countNum = 3;
    this.scene = 'countdown';
  },

  /* ========== ネット対戦（ホスト権限同期） ========== */
  // net.js が state==='playing' を検知したら match 情報とともに呼ぶ
  startNetMatch(match, myId, isHost) {
    const order = Object.values(match);            // [{pid,char,color}] 全クライアント共通順
    const fighters = [];
    this.netControllers = {};                      // pid -> RemoteController（ホスト用）
    order.forEach((m, i) => {
      const isSelf = m.pid === myId;
      const f = new Fighter(m.char, m.color, { human: isSelf, label: 'P' + (i + 1) });
      f.pid = m.pid;
      if (isHost) {
        if (isSelf) { f.controller = HumanController; }
        else { const rc = new RemoteController(); this.netControllers[m.pid] = rc; f.controller = rc; }
      } else {
        // クライアントはシミュレーションしない（スナップショット描画）。controllerは未使用
        f.controller = { poll(){}, dirX(){return 0;}, dir(){return 'none';}, held:{}, edge:{} };
        f.netMode = true;
      }
      fighters.push(f);
    });
    this.world = new World(fighters, { net: true });
    this.world.netRole = isHost ? 'host' : 'client';
    this.world.myIndex = order.findIndex(m => m.pid === myId);

    this._netPubTick = 0; this._netInFrame = 0; this._lastInput = '';
    this._netSnap = null; this._ic = { X:0, Y:0, A:0, B:0, SP:0 };

    if (isHost) {
      Net.clearMatchData();                        // 古い入力/スナップショットを掃除
      Net.onInputs((mapOfInputs) => {
        for (const pid in this.netControllers) {
          if (mapOfInputs && mapOfInputs[pid]) this.netControllers[pid].setData(mapOfInputs[pid]);
        }
      });
    } else {
      Net.onSnapshot((snap) => { this._netSnap = snap; });
    }
    this.mode = 'versus';
    this.drawMode = null; this._stroke = null;
    this.countdown = 0; this.countNum = 3; this._lastPhase = -1;
    this.scene = 'countdown';
  },

  // ホスト：全fighterの状態を圧縮してRTDBへ
  encodeSnapshot(world) {
    return {
      t: Date.now(),
      o: world.over ? 1 : 0,
      w: world.winner ? world.fighters.indexOf(world.winner) : -1,
      f: world.fighters.map(f => ({
        x: Math.round(f.x), y: Math.round(f.y), vx: Math.round(f.vx * 10) / 10,
        fa: f.facing, s: f.state, w: f.weapon, d: Math.round(f.damage), k: f.stocks,
        spa: Math.round(f.spActive), spcd: Math.round(f.spCooldown), b: f.boxOpen ? 1 : 0, bs: f.boxSel || 0,
        iv: f.invuln > 0 ? 1 : 0, rt: f.respawnTimer > 0 ? 1 : 0, dd: f.dead ? 1 : 0,
        sh: f.shielding ? 1 : 0, shv: Math.round(f.shield), gb: f.guardBreak > 0 ? 1 : 0,
        mf: f.mathFrozen ? 1 : 0, ms: f.mathSelecting ? 1 : 0, mwf: f.mathWrongFlash > 0 ? 1 : 0,
        mq: (f.mathFrozen && f.mathProblem) ? f.mathProblem.text : '',
        mc: (f.mathFrozen && f.mathProblem) ? f.mathProblem.choices : null,
        mti: f.mathTargetIdx || 0,
        tstop: f.timeStopped > 0 ? 1 : 0, slw: f.slowed > 0 ? 1 : 0, scd: Math.round(f.specialCD()),
        drw: f.drawing ? 1 : 0,
      })),
      p: world.projectiles.map(pr => ({ x: Math.round(pr.x), y: Math.round(pr.y) })),
      dood: world.doodles.length ? world.doodles.map(d => ({
        x: Math.round(d.x), y: Math.round(d.y), a: Math.round(d.angle * 100),
        p: d.pts.map(pt => [Math.round(pt.x), Math.round(pt.y)]),
      })) : undefined,
      se: (this._seEvents && this._seEvents.length) ? this._seEvents : undefined,
    };
  },

  // クライアント：受信スナップショットをfighterへ反映（予測なし）
  applyNetSnapshot(world, snap) {
    const F = snap.f || [];
    const myI = (world.netRole === 'client') ? world.myIndex : -1;
    for (let i = 0; i < world.fighters.length && i < F.length; i++) {
      const f = world.fighters[i], s = F[i];
      if (s.d > f.damage) spawnHitSpark(f.x, f.y - 40);   // 被弾でスパーク
      // ステータス系（常にホスト権威）
      f.state = s.s; f.weapon = s.w; f.damage = s.d; f.stocks = s.k;
      f.spActive = s.spa || 0; f.spCooldown = s.spcd || 0; f.boxOpen = !!s.b; f.boxSel = s.bs || 0;
      f.invuln = s.iv ? 1 : 0; f.respawnTimer = s.rt ? 1 : 0; f.dead = !!s.dd;
      f.shielding = !!s.sh; f.shield = (s.shv != null ? s.shv : SHIELD_MAX); f.guardBreak = s.gb ? 1 : 0;
      f.mathFrozen = !!s.mf; f.mathSelecting = !!s.ms; f.mathWrongFlash = s.mwf ? 1 : 0;
      f.mathTargetIdx = s.mti || 0;
      f.timeStopped = s.tstop ? 1 : 0;
      f.slowed = s.slw ? 1 : 0;
      f.drawing = !!s.drw;
      // 固有スキルのクールタイムを該当フィールドへ（ボタン表示用）
      const _cd = s.scd || 0;
      if (f.def.id === 'chara_time') f.timeCooldown = _cd;
      else if (f.def.id === 'chara_slow') f.slowCooldown = _cd;
      else if (f.def.id === 'chara_math') f.mathCooldown = _cd;
      f.mathProblem = (s.mf && s.mq) ? { text: s.mq, choices: s.mc || [], answer: null } : (f.mathFrozen ? f.mathProblem : null);
      f.facing = s.fa; f.vx = s.vx;
      if (i === myI) {
        // 自キャラ：補間なしで即時反映（受信した瞬間にそのまま描画＝最小遅延）
        f.x = s.x; f.y = s.y;
      } else {
        // 相手キャラ：軽い補間でなめらかに
        if (f._tx === undefined) { f.x = s.x; f.y = s.y; }
        f.x = lerp(f.x, s.x, 0.5); f.y = lerp(f.y, s.y, 0.5);
      }
      f._tx = s.x; f._ty = s.y;
    }
    world.netProjectiles = snap.p || [];
    world.netDoodles = snap.dood || [];
    world.over = !!snap.o;
    world.winner = (snap.w >= 0 && snap.w < world.fighters.length) ? world.fighters[snap.w] : null;
    // ホストで鳴ったSEをクライアントでも再生（対戦時の音を安定化）
    if (snap.se) for (const ev of snap.se) Sound.playRemote(ev[0], ev[1] || 0);
  },
  // クライアントで自キャラをローカル予測してよいか（自由状態のみ）
  canPredict(f) {
    if (!f || !f._hostFree) return false;
    const st = f._hostState || f.state;
    return st === 'idle' || st === 'run' || st === 'jump_up' || st === 'jump_air';
  },

  // クライアント：自分の入力をRTDBへ（変化時 or 一定間隔）
  sendNetInput() {
    const e = Input.edge;
    if (e.X) this._ic.X++; if (e.Y) this._ic.Y++; if (e.A) this._ic.A++;
    if (e.B) this._ic.B++; if (e.SP) this._ic.SP++;
    const h = Input.held;
    const payload = {
      l: h.left ? 1 : 0, r: h.right ? 1 : 0, u: h.up ? 1 : 0, d: h.down ? 1 : 0,
      ax: Math.round(Input.moveX() * 10) * 10,  // アナログ横入力（0.1刻み＝送信スパム抑制）
      sb: h.B ? 1 : 0,                         // シールド（B長押し）の保持状態
      cX: this._ic.X, cY: this._ic.Y, cA: this._ic.A, cSP: this._ic.SP,
    };
    if (this._boxPick) { payload.bs = this._boxPick.v; payload.bsSeq = this._boxPick.seq; }
    if (this._mathAns) { payload.ma = this._mathAns.v; payload.maSeq = this._mathAns.seq; }
    if (this._mathTgt) { payload.mt = this._mathTgt.v; payload.mtSeq = this._mathTgt.seq; }
    if (this._drawSend) { payload.dr = this._drawSend.pts.map(p => [Math.round(p.x), Math.round(p.y)]); payload.drSeq = this._drawSend.seq; }
    if (this._endDraw) { payload.edSeq = this._endDraw.seq; }
    const s = JSON.stringify(payload);
    this._netInFrame = (this._netInFrame || 0) + 1;
    if (s !== this._lastInput || this._netInFrame % 2 === 0) { this._lastInput = s; Net.writeInput(payload); }
    this._drawSend = null; this._endDraw = null;   // 大きなストロークは1回送ったら破棄
  },

  // アイテム/算数のUI操作（ローカルは即実行、ネットクライアントは入力で送信）
  pickBox(f, i) {
    const opt = f.boxOptions()[i];
    if (this.world && this.world.netRole === 'client') {
      this._boxPick = { v: i, seq: (this._boxPickSeq = (this._boxPickSeq || 0) + 1) };
      if (opt && opt.type === 'draw') this.drawMode = f;   // クライアントでも描画UIを開く
    } else { f.boxSel = i; f.applyBoxSelection(this.world); }
  },
  answerMath(f, value) {
    if (this.world && this.world.netRole === 'client') { this._mathAns = { v: value, seq: (this._mathAnsSeq = (this._mathAnsSeq || 0) + 1) }; }
    else { f.submitMathAnswer(value); }
  },
  chooseMathTarget(f, opp, idx) {
    if (this.world && this.world.netRole === 'client') { this._mathTgt = { v: idx, seq: (this._mathTgtSeq = (this._mathTgtSeq || 0) + 1) }; }
    else { f.confirmMathTarget(opp[idx]); }
  },

  leaveNet() {
    if (window.Net && Net.leave) Net.leave();
    if (this.world) { this.world.netRole = null; }
    this.resultTimer = 0; this.scene = 'title';
  },

  /* ---------- カウントダウン（設計書 12） ---------- */
  sceneCountdown() {
    this.sceneBattle(true);              // 背景＆キャラを描画（停止）
    const ctx = this.ctx;
    this.countdown++;
    const phase = Math.floor(this.countdown / 50);
    if (phase !== this._lastPhase) {
      this._lastPhase = phase;
      if (phase < 3) Sound.play('se_countdown');
      else if (phase === 3) Sound.play('se_gong');
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const local = this.countdown % 50, scl = 1 + (1 - local/50) * 1.5;
    let txt = '';
    if (phase === 0) txt = '3'; else if (phase === 1) txt = '2'; else if (phase === 2) txt = '1';
    else if (phase === 3) txt = 'start‼';
    ctx.save(); ctx.translate(W/2, H/2 - 60);
    if (phase < 3) ctx.scale(scl, scl);
    ctx.fillStyle = phase === 3 ? '#ffd166' : '#fff';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 12;
    ctx.font = 'bold ' + (phase === 3 ? 90 : 160) + 'px sans-serif';
    ctx.fillText(txt, 0, 0); ctx.restore();
    ctx.shadowBlur = 0;
    if (phase >= 4) { this.scene = 'battle'; this._lastPhase = -1; }
  },

  /* ---------- 対戦（設計書 12/13） ---------- */
  sceneBattle(frozen) {
    const ctx = this.ctx;
    const world = this.world;
    drawStage(ctx);

    const role = world.netRole;     // 'host' | 'client' | undefined（ローカル）
    if (!frozen && world && !world.over) {
      if (role === 'host') {
        Sound.beginCapture();
        world.update();
        this._seEvents = Sound.endCapture();             // このフレームに鳴ったSEを配信に乗せる
        Net.writeSnapshot(this.encodeSnapshot(world));   // 毎フレーム配信（最小遅延・予測なし）
      } else if (role === 'client') {
        this.sendNetInput();                                   // 自分の入力を送信（変化時は即送信）
        if (this._netSnap) this.applyNetSnapshot(world, this._netSnap);
        for (const f of world.fighters) { f.netMode = true; if (f.timeStopped <= 0) f.updateAnim(null); }  // 停止中はアニメも止める
        updateSparks();
      } else {
        world.update();
      }
    }

    // 描画（投射物：クライアントは受信座標、それ以外はローカル）
    if (role === 'client') {
      ctx.fillStyle = '#ffe066';
      for (const pr of (world.netProjectiles || [])) { ctx.beginPath(); ctx.arc(pr.x, pr.y, 5, 0, Math.PI*2); ctx.fill(); }
    } else {
      for (const p of world.projectiles) p.draw(ctx);
    }
    // Q2の白線（落書き）
    if (role === 'client') {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      for (const d of (world.netDoodles || [])) {
        ctx.save(); ctx.translate(d.x, d.y); ctx.rotate((d.a || 0) / 100);
        ctx.beginPath(); (d.p || []).forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1])); ctx.stroke();
        ctx.restore();
      }
    } else {
      for (const d of world.doodles) d.draw(ctx);
    }
    for (const f of world.fighters) if (!f.dead && f.respawnTimer <= 0) drawCharacter(ctx, f);
    drawSparks(ctx);
    // 時間停止の演出：開始時に画面フラッシュ（ホスト/クライアント共通で検出）
    const anyStop = world.fighters.some(f => f.timeStopped > 0 && !f.dead);
    if (anyStop && !this._wasStop) world.timeStopFlash = 30;
    this._wasStop = anyStop;
    if (world.timeStopFlash > 0) {
      ctx.fillStyle = 'rgba(120,200,255,' + (world.timeStopFlash / 30 * 0.45) + ')';
      ctx.fillRect(0, 0, W, H);
      if (world.timeStopFlash > 18) { ctx.fillStyle = '#bfe6ff'; ctx.font = 'bold 70px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('TIME STOP', W/2, H/2 - 80); }
      world.timeStopFlash--;
    }
    drawHUD(ctx, world);
    // 仮想コントローラ（自分のキャラに対して）。お絵かき中はコントローラを隠して描画UIに
    const localF = (world.myIndex != null) ? world.fighters[world.myIndex] : world.fighters[0];
    if (this.drawMode && (this.drawMode.dead || this.drawMode.respawnTimer > 0)) this.exitDrawMode();  // 描画中にKOされたら解除
    if (this.drawMode) this.drawDrawingUI(ctx);
    else drawVirtualController(ctx, localF);
    drawMathUI(ctx, world, localF);

    if (role && !this.drawMode) {
      this.btn(W - 110, 16, 94, 44, '退出', () => { this.leaveNet(); }, { font:18 });
    }

    // トレーニング用ボタン
    if (this.world.training) {
      this.btn(W - 360, 16, 160, 44, 'ダメージリセット', () => { for (const f of this.world.fighters) f.damage = 0; }, { font:18 });
      this.btn(W - 190, 16, 80, 44, 'BOT切替', () => {
        const b = this.world.fighters[1];
        const nm = b.controller.mode === 'cpu' ? 'static' : 'cpu';
        b.controller.mode = nm;
      }, { font:16 });
      this.btn(W - 100, 16, 84, 44, 'タイトル', () => { this.scene = 'title'; }, { font:16 });
    }

    if (this.world.over) {
      this.resultTimer = (this.resultTimer || 0) + 1;
      const w = this.world.winner;
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#ffd166'; ctx.font = 'bold 80px sans-serif';
      ctx.fillText((w ? w.label + ' (' + w.def.name + ')' : '') + ' WIN！', W/2, H/2 - 20);
      if (this.resultTimer > 120) { this.scene = 'result'; }
    }
  },

  /* ---------- リザルト（設計書 12） ---------- */
  sceneResult() {
    const ctx = this.ctx; bgGradient(ctx);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 60px sans-serif';
    ctx.fillText('リザルト', W/2, 110);
    // 順位：生存→脱落、各群はストック降順（ネット時は placements が無くても成立）
    const order = this.world.fighters.slice().sort((a, b) => {
      if (a.dead !== b.dead) return a.dead ? 1 : -1;
      if (b.stocks !== a.stocks) return b.stocks - a.stocks;
      return a.damage - b.damage;
    });
    order.forEach((f, i) => {
      const y = 200 + i * 80;
      ctx.fillStyle = i === 0 ? '#ffd166' : '#26324d';
      roundRect(ctx, W/2 - 320, y - 32, 640, 64, 10); ctx.fill();
      ctx.fillStyle = i === 0 ? '#1a1a1a' : '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 30px sans-serif';
      ctx.fillText((i+1) + '位', W/2 - 290, y + 8);
      ctx.fillText(f.label + '  /  ' + f.def.name, W/2 - 180, y + 8);
      ctx.textAlign = 'right';
      ctx.fillText('残ストック ' + f.stocks, W/2 + 290, y + 8);
    });
    if (this.world.netRole) {
      // ネット対戦：キャラ選択(ロビー)へ戻る / 退出
      const hint = (window.Net && Net.isHost) ? 'キャラ選択へ戻る' : 'キャラ選択へ（ホスト待ち）';
      this.btn(W/2 - 270, 580, 270, 70, hint, () => { this.resultTimer = 0; if (window.Net && Net.returnToLobby) Net.returnToLobby(); }, { color:'#2e8b57', font:24 });
      this.btn(W/2 + 20, 580, 250, 70, '退出してタイトルへ', () => { this.leaveNet(); }, { font:22 });
    } else {
      // ローカル対戦：もう一度 / キャラ選択へ / タイトルへ
      this.btn(W/2 - 345, 580, 220, 70, 'もう一度', () => { this.resultTimer = 0; this.startMatch(); }, { color:'#2e8b57', font:26 });
      this.btn(W/2 - 110, 580, 220, 70, 'キャラ選択へ', () => { this.resultTimer = 0; this.scene = 'charselect'; }, { font:26 });
      this.btn(W/2 + 125, 580, 220, 70, 'タイトルへ', () => { this.resultTimer = 0; this.scene = 'title'; }, { font:26 });
    }
  },
};

/* ======================= 13. 描画ヘルパー ======================= */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function bgGradient(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a2238'); g.addColorStop(1, '#0a0e1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function drawStage(ctx) {
  // 背景：空＋都市シルエット（設計書 10）
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#2b3a67'); g.addColorStop(0.6, '#1f2a4a'); g.addColorStop(1, '#0c1226');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(20,30,60,0.6)';
  for (let i = 0; i < 14; i++) { const bx = i * 95 + 10, bh = 80 + (i*53 % 160); ctx.fillRect(bx, H - bh, 70, bh); }
  // メイン台
  ctx.fillStyle = '#3a4a6a';
  roundRect(ctx, STAGE.main.x1, STAGE.main.y, STAGE.main.x2 - STAGE.main.x1, 120, 6); ctx.fill();
  ctx.fillStyle = '#52628a'; ctx.fillRect(STAGE.main.x1, STAGE.main.y, STAGE.main.x2 - STAGE.main.x1, 8);
  // 中央台
  ctx.fillStyle = '#46567e';
  roundRect(ctx, STAGE.center.x1, STAGE.center.y, STAGE.center.x2 - STAGE.center.x1, 16, 6); ctx.fill();
  ctx.fillStyle = '#6678a8'; ctx.fillRect(STAGE.center.x1, STAGE.center.y, STAGE.center.x2 - STAGE.center.x1, 4);
}
// HUD（設計書 13）
function drawHUD(ctx, world) {
  const players = world.fighters;
  const n = players.length, bw = 200, gap = 20;
  const total = n * bw + (n - 1) * gap;
  let sx = (W - total) / 2;
  players.forEach((f, i) => {
    const x = sx + i * (bw + gap), y = 14;
    ctx.fillStyle = f.dead ? 'rgba(40,40,40,0.7)' : 'rgba(20,28,46,0.85)';
    roundRect(ctx, x, y, bw, 78, 10); ctx.fill();
    ctx.strokeStyle = f.color(); ctx.lineWidth = 3; ctx.stroke();
    // 名前
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText(f.label + ' ' + f.def.name, x + 12, y + 24);
    // ダメージ%
    ctx.textAlign = 'right';
    const big = f.isHuman;
    ctx.font = 'bold ' + (big ? 38 : 30) + 'px sans-serif';
    ctx.fillStyle = f.dead ? '#888' : (f.damage >= 100 ? '#ff4d4d' : '#fff');  // 100%超で赤（設計書 13）
    ctx.fillText(Math.floor(f.damage) + '%', x + bw - 12, y + 56);
    // ストック（ハート・設計書 13）
    ctx.textAlign = 'left'; ctx.font = '18px sans-serif';
    let hearts = '';
    for (let s = 0; s < 3; s++) hearts += s < f.stocks ? '♥' : '♡';
    ctx.fillStyle = '#ff6b81'; ctx.fillText(hearts, x + 12, y + 56);
    // 装備武器アイコン
    if (f.weapon !== 'bare') { ctx.font = '20px sans-serif'; ctx.textAlign = 'right'; ctx.fillText(WEAPONS[f.weapon].icon, x + bw - 12, y + 24); }
  });
}

/* ---- 仮想コントローラ描画（設計書 4） ---- */
function drawVirtualController(ctx, human) {
  ctx.globalAlpha = 0.85;
  // 左スティック（+25%）
  const sb = { cx: 165, cy: H - 150, r: 100 };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.arc(sb.cx, sb.cy, sb.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 3; ctx.stroke();
  let tx = sb.cx, ty = sb.cy;
  if (Input.stick.active) {
    const m = Math.min(Math.hypot(Input.stick.dx, Input.stick.dy), sb.r);
    const a = Math.atan2(Input.stick.dy, Input.stick.dx);
    tx = sb.cx + Math.cos(a) * m; ty = sb.cy + Math.sin(a) * m;
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.arc(tx, ty, 45, 0, Math.PI*2); ctx.fill();

  // 右側ボタン群 + SP（設計書 4 の配置・各ボタン+25%）
  const defs = [
    { name:'SP', x: W/2 - 40,  y: H - 95,  r: 58, label:'SP', color:'rgba(255,140,40,0.4)' },
    { name:'X',  x: W - 215,  y: H - 215, r: 53, label:'X' },
    { name:'Y',  x: W - 300,  y: H - 125, r: 53, label:'Y' },
    { name:'A',  x: W - 130,  y: H - 125, r: 53, label:'A' },
    { name:'B',  x: W - 215,  y: H - 62,  r: 53, label:'🛡' },
  ];
  Input.btnRects = {};
  for (const d of defs) {
    Input.btnRects[d.name] = { x: d.x - d.r, y: d.y - d.r, w: d.r*2, h: d.r*2 };
    const pressed = Input.held[d.name];
    ctx.fillStyle = pressed ? 'rgba(255,209,102,0.6)' : (d.color || 'rgba(255,255,255,0.15)');
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (d.name === 'B' ? 30 : 26) + 'px sans-serif';
    ctx.fillText(d.label, d.x, d.y);
    // SPクールタイム円弧（設計書 8）
    if (d.name === 'SP' && human) {
      if (human.spCooldown > 0) {
        const p = 1 - human.spCooldown / 1200;
        ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + p * Math.PI*2); ctx.stroke();
      } else if (human.spActive > 0) {
        ctx.strokeStyle = '#4dff88'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();
      }
    }
    // Bボタン：シールド耐久ゲージ
    if (d.name === 'B' && human) {
      ctx.lineWidth = 5;
      if (human.guardBreak > 0) {
        ctx.strokeStyle = '#ff4d4d';
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();   // 割れ＝赤満
      } else {
        const sr = Math.max(0, Math.min(1, human.shield / SHIELD_MAX));
        ctx.strokeStyle = `hsl(${120 * sr},90%,60%)`;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + sr * Math.PI*2); ctx.stroke();
      }
    }
    // Aボタン：固有スキル（時間停止/スロー/算数）のクールタイム表示
    if (d.name === 'A' && human && human.specialCDMax() > 0) {
      const cd = human.specialCD(), max = human.specialCDMax();
      if (cd > 0) {
        const p = 1 - cd / max;
        ctx.strokeStyle = '#ff9f40'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + p * Math.PI*2); ctx.stroke();
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();  // 暗転＝使用不可
        ctx.fillStyle = '#ffd166'; ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.ceil(cd / 60) + 's', d.x, d.y);   // 残り秒数
      } else {
        ctx.strokeStyle = '#4dff88'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();   // 準備OK＝緑リング
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.textBaseline = 'alphabetic';

  // アイテムボックスUI（開いている時・設計書 7）
  if (human && human.boxOpen) drawItemBox(ctx, human);
}
function drawItemBox(ctx, f) {
  const items = f.boxOptions();
  const perRow = 3, rows = Math.ceil(items.length / perRow);
  // 約30%拡大
  const iw = 170, ih = 78, ig = 21, rowH = 94;
  const bw = 936, bh = 140 + rows * rowH, bx = (W - bw)/2, by = 120;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1d2840'; roundRect(ctx, bx, by, bw, bh, 16); ctx.fill();
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 34px sans-serif';
  ctx.fillText('アイテムボックス', W/2, by + 46);
  items.forEach((it, i) => {
    const col = i % perRow, row = Math.floor(i / perRow);
    const x = W/2 - (perRow*iw + (perRow-1)*ig)/2 + col*(iw+ig);
    const y = by + 74 + row*rowH;
    const sel = f.boxSel === i;
    const special = (it.type === 'math' || it.type === 'time' || it.type === 'slow');
    const onCD = special && f.specialCD() > 0;
    ctx.fillStyle = special ? (sel ? '#7a5fae' : '#4a3a6a') : (sel ? '#3a6ea5' : '#26324d');
    roundRect(ctx, x, y, iw, ih, 10); ctx.fill();
    if (sel) { ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4; ctx.stroke(); }
    ctx.fillStyle = '#fff'; ctx.font = '19px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(it.icon + ' ' + it.label, x + iw/2, y + ih/2 + (onCD ? -2 : 7));
    if (onCD) {  // クールタイム中：暗転＋残り秒数
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; roundRect(ctx, x, y, iw, ih, 10); ctx.fill();
      ctx.fillStyle = '#ff9f40'; ctx.font = 'bold 22px sans-serif';
      ctx.fillText('CT ' + Math.ceil(f.specialCD() / 60) + 's', x + iw/2, y + ih/2 + 8);
    } else if (special) {  // 準備OK
      ctx.fillStyle = '#4dff88'; ctx.font = '13px sans-serif';
      ctx.fillText('READY', x + iw/2, y + ih - 10);
    }
    // タッチ：セルを直接タップで選択＆実行
    Game.btn(x, y, iw, ih, '', () => Game.pickBox(f, i), { bare:true });
  });
  ctx.fillStyle = '#9fb3d1'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('タップ または ←→で選択 / A=決定', W/2, by + bh - 18);
}

// 算数（mathキャラ）UI：問題表示／回答ボタン／対象選択（すべてタップ対応）
function drawMathUI(ctx, world, localF) {
  // 出題中のキャラ頭上に問題
  for (const f of world.fighters) {
    if (f.mathFrozen && f.mathProblem && !f.dead && f.respawnTimer <= 0) {
      const tx = f.x, ty = f.y - 92, txt = f.mathProblem.text + ' = ?';
      ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      const w = ctx.measureText(txt).width + 28;
      ctx.fillStyle = f.mathWrongFlash > 0 ? 'rgba(200,40,40,0.92)' : 'rgba(20,28,46,0.92)';
      roundRect(ctx, tx - w/2, ty - 24, w, 36, 8); ctx.fill();
      ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.fillText(txt, tx, ty);
    }
  }
  if (!localF) return;
  // 自分が出題されている（人間）→ 回答パネル
  if (localF.mathFrozen && localF.mathProblem) {
    const p = localF.mathProblem;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif';
    ctx.fillText('正解するまで動けない！', W/2, 130);
    ctx.fillStyle = '#ffd166'; ctx.font = 'bold 56px sans-serif';
    ctx.fillText(p.text + ' = ?', W/2, 210);
    const ch = p.choices || [], bw = 150, gap = 20, total = ch.length * bw + (ch.length - 1) * gap;
    const sx = (W - total) / 2;
    ch.forEach((c, i) => Game.btn(sx + i * (bw + gap), 250, bw, 84, String(c), () => Game.answerMath(localF, c), { color:'#2e8b57', font:38 }));
    if (localF.mathWrongFlash > 0) { ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('✗ 不正解！次の問題へ', W/2, 380); }
  }
  // 自分がmathキャラで対象選択中 → 相手を選ぶ
  if (localF.mathSelecting) {
    const opp = world.fighters.filter(f => f !== localF && !f.dead);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 30px sans-serif';
    ctx.fillText('🧮 誰に算数を出す？', W/2, 170);
    const bw = 220, gap = 20, total = opp.length * bw + (opp.length - 1) * gap;
    const sx = (W - total) / 2;
    opp.forEach((o, i) => {
      const sel = (((localF.mathTargetIdx % opp.length) + opp.length) % opp.length) === i;
      Game.btn(sx + i * (bw + gap), 220, bw, 90, o.label + ' / ' + o.def.name, () => Game.chooseMathTarget(localF, opp, i), { color: sel ? '#7a5fae' : '#4a3a6a', font:22 });
    });
    Game.btn(W/2 - 100, 350, 200, 56, 'キャンセル', () => { localF.mathSelecting = false; }, { font:22 });
  }
}
// キャラ選択プレビュー用の簡易棒人間
function drawPreviewFighter(ctx, x, y, charId, color) {
  ctx.save(); ctx.translate(x, y); ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
  drawLeg(ctx, -5, -25, 8, 8, 13, 12);
  drawLeg(ctx, 5, -25, -8, 8, 13, 12);
  ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(0, -53); ctx.stroke();
  drawArm(ctx, 0, -49, 25, 20); drawArm(ctx, 0, -49, -25, 20);
  ctx.beginPath(); ctx.arc(0, -65, 12, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

/* ======================= 14. 起動 ======================= */
window.SunmaGame = Game;
// net.js（別スクリプト）から参照するデータを公開
window.SunmaData = { CHARS, CHAR_ORDER, COLORS, RemoteController };
// load イベントを待たずに確実に起動（タイミング差で初期化漏れ＝グレー画面になるのを防ぐ）
function bootSunma() {
  if (Game._booted) return;
  try {
    if (!document.getElementById('game')) { setTimeout(bootSunma, 30); return; }
    Game._booted = true;
    Game.init();
  } catch (err) {
    Game._booted = false;
    console.error('[スンマ戦] init error:', err);
    const cv = document.getElementById('game');
    if (cv) {
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#220000'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 24px monospace';
      ctx.fillText('初期化エラー: ' + (err.message || err), 40, 80);
    }
  }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootSunma);
else bootSunma();
window.addEventListener('load', bootSunma);

</script>
